<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CHEESE BOARD // Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .badge {
            font-family: var(--font-display);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid;
            white-space: nowrap;
            display: inline-block;
        }
        .badge-ffa { color: var(--neon-yellow); border-color: var(--neon-yellow); background: rgba(255,225,0,0.06); }
        .badge-solo { color: var(--neon-purple); border-color: var(--neon-purple); background: rgba(176,38,255,0.06); }
        .badge-team { color: var(--neon-magenta); border-color: var(--neon-magenta); background: rgba(255,45,149,0.06); }
        .badge-active { color: var(--neon-green); border-color: var(--neon-green); background: rgba(57,255,20,0.06); animation: pulse-active 2s ease-in-out infinite; }
        .badge-completed { color: var(--text-dim); border-color: var(--border-dim); }
        @keyframes pulse-active { 0%,100%{opacity:1} 50%{opacity:0.6} }

        /* Modal steps */
        .modal-step { display: none; }
        .modal-step.active { display: block; }
        .modal-step-header {
            font-family: var(--font-display);
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: var(--space-xs);
        }
        .modal-nav {
            display: flex;
            justify-content: space-between;
            gap: var(--space-sm);
            margin-top: var(--space-xl);
        }

        /* Collapsible */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: var(--space-sm);
            user-select: none;
        }
        .collapsible-header .chevron {
            display: inline-block;
            transition: transform 0.2s;
        }
        .collapsible-header.collapsed .chevron {
            transform: rotate(-90deg);
        }
        .collapsible-body.hidden { display: none; }

        /* Player selection checkboxes */
        .player-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--space-sm);
            margin: var(--space-sm) 0;
        }
        .player-checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .player-checkbox-item:hover {
            border-color: var(--border-glow);
        }
        .player-checkbox-item input[type="checkbox"] {
            accent-color: var(--neon-cyan);
            width: 14px;
            height: 14px;
        }
        .player-checkbox-item.checked {
            border-color: var(--neon-cyan);
            background: rgba(0,240,255,0.05);
        }
        .player-checkbox-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .player-checkbox-item.checked .player-checkbox-label {
            color: var(--neon-cyan);
        }

        /* Team checkbox grid */
        .team-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--space-sm);
            margin: var(--space-sm) 0;
        }
        .team-checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .team-checkbox-item.checked {
            border-color: var(--neon-magenta);
            background: rgba(255,45,149,0.05);
        }
        .team-checkbox-item input[type="checkbox"] {
            accent-color: var(--neon-magenta);
        }

        /* Team preview */
        .teams-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--space-md);
            margin-top: var(--space-md);
        }
        .team-preview-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            padding: var(--space-md);
        }
        .team-preview-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-magenta);
            margin-bottom: var(--space-sm);
        }
        .team-preview-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .team-preview-player:last-child { border-bottom: none; }
        .move-player-btn {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            cursor: pointer;
            padding: 2px 6px;
            transition: all 0.2s;
        }
        .move-player-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Round management */
        .manage-section {
            background: var(--bg-panel);
            border: 1px solid var(--neon-purple);
            border-radius: var(--radius-md);
            padding: var(--space-lg);
            margin-top: var(--space-lg);
        }
        .manage-section-title {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-purple);
            text-shadow: var(--glow-purple);
            margin-bottom: var(--space-lg);
        }

        /* FFA placement form */
        .ffa-placement-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-dim);
        }
        .ffa-placement-row:last-child { border-bottom: none; }
        .ffa-placement-name {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .ffa-placement-input {
            width: 80px;
        }

        /* Bracket container */
        .bracket-admin-container {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            padding: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        /* Review summary */
        .review-item {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        .review-item:last-child { border-bottom: none; }
        .review-label { color: var(--text-dim); min-width: 120px; }
        .review-value { color: var(--text-primary); }

        /* Inline radio */
        .radio-group {
            display: flex;
            gap: var(--space-lg);
            margin: var(--space-sm) 0;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .radio-item input[type="radio"] {
            accent-color: var(--neon-cyan);
        }

        .section-count {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: var(--space-sm);
        }

        .btn-warning {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
        }
        .btn-warning:hover {
            background: rgba(255,225,0,0.1);
            box-shadow: 0 0 10px rgba(255,225,0,0.3);
        }
        .btn-purple {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }
        .btn-purple:hover {
            background: rgba(176,38,255,0.1);
            box-shadow: var(--glow-purple);
        }

        .form-textarea {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }
        .form-textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="site-header">
            <h1 class="site-title">THE CHEESE BOARD</h1>
            <p class="site-subtitle">// Admin Terminal //</p>
            <nav class="nav-bar">
                <a href="index.html" class="nav-link">Standings</a>
                <a href="rounds.html" class="nav-link">Rounds</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>

        <!-- LOGIN -->
        <div id="login-section" class="admin-login">
            <div class="panel">
                <div class="panel-title">Admin Access</div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter') handleLogin()">
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:var(--space-sm);" onclick="handleLogin()">
                    Initialize Connection
                </button>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
                <h2 class="section-header" style="margin-bottom:0; border:none; padding:0;">Admin <span class="accent">Panel</span></h2>
                <button class="btn btn-danger btn-sm" onclick="handleLogout()">Logout</button>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab(this, 'players')">Players</button>
                <button class="admin-tab" onclick="switchTab(this, 'rounds')">Rounds</button>
            </div>

            <!-- TAB: PLAYERS -->
            <div id="tab-players" class="tab-content active">
                <div class="panel">
                    <div class="panel-title">Add Player</div>
                    <div style="display:flex; gap:var(--space-sm); flex-wrap:wrap;">
                        <input type="text" id="new-gamertag" class="form-input" placeholder="Gamertag" style="flex:1; min-width:120px;">
                        <input type="text" id="new-realname" class="form-input" placeholder="Real Name" style="flex:1; min-width:120px;">
                        <button class="btn btn-primary" onclick="addPlayer()">Add</button>
                    </div>
                </div>
                <div id="players-list"></div>
            </div>

            <!-- TAB: ROUNDS -->
            <div id="tab-rounds" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
                    <h3 style="font-family:var(--font-display);font-size:0.8rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;">All Rounds</h3>
                    <button class="btn btn-primary" onclick="openNewRoundModal()">+ New Round</button>
                </div>
                <div id="rounds-list"></div>
                <div id="manage-round-section"></div>
            </div>
        </div>
    </div>

    <!-- NEW ROUND MODAL -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModalOverlay(event)">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- MATCH RESULT MODAL -->
    <div id="match-modal-overlay" class="modal-overlay" onclick="closeMatchModalOverlay(event)">
        <div class="modal" id="match-modal-content"></div>
    </div>

    <!-- MOVE PLAYER MODAL -->
    <div id="move-modal-overlay" class="modal-overlay" onclick="closeMoveModalOverlay(event)">
        <div class="modal" id="move-modal-content" style="max-width:320px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
    // ============================================
    // STATE
    // ============================================
    let allPlayers = [];
    let allRounds = [];
    let allTeams = [];
    let playerStandings = [];

    // New round wizard state
    let wizardStep = 1;
    let wizardData = {};
    let generatedTeams = []; // [{label, players:[]}]

    // Current managed round
    let managedRound = null;
    let managedMatches = [];
    let managedRoundPlayers = [];
    let managedRoundTeams = [];

    // ============================================
    // AUTH
    // ============================================
    async function checkAuth() {
        const admin = await isAdmin();
        document.getElementById('login-section').style.display = admin ? 'none' : 'block';
        document.getElementById('admin-panel').style.display = admin ? 'block' : 'none';
        if (admin) loadAllData();
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) return showToast('Enter credentials', 'error');
        try {
            await signIn(email, password);
            showToast('Access granted');
            checkAuth();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function handleLogout() {
        await signOut();
        showToast('Disconnected');
        checkAuth();
    }

    // ============================================
    // TABS
    // ============================================
    function switchTab(btn, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ============================================
    // DATA LOADING
    // ============================================
    async function loadAllData() {
        try {
            [allPlayers, allRounds, allTeams, playerStandings] = await Promise.all([
                fetchPlayers(),
                fetchRounds(),
                fetchTeams(),
                fetchPlayerStandings()
            ]);
            renderPlayersList();
            renderRoundsList();
        } catch (err) {
            console.error(err);
            showToast('Error loading data', 'error');
        }
    }

    // ============================================
    // PLAYERS CRUD
    // ============================================
    function renderPlayersList() {
        const container = document.getElementById('players-list');
        if (allPlayers.length === 0) {
            container.innerHTML = '<div class="empty-state">No players yet.</div>';
            return;
        }
        container.innerHTML = allPlayers.map(p => `
            <div class="admin-list-item">
                <div class="admin-list-info">
                    <div class="admin-list-title">${escapeHtml(p.gamertag)}</div>
                    <div class="admin-list-meta">${escapeHtml(p.real_name)}</div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="deletePlayer('${p.id}')">Delete</button>
            </div>
        `).join('');
    }

    async function addPlayer() {
        const gamertag = document.getElementById('new-gamertag').value.trim();
        const real_name = document.getElementById('new-realname').value.trim();
        if (!gamertag || !real_name) return showToast('Fill in both fields', 'error');
        try {
            const { error } = await supabaseClient.from('players').insert({ gamertag, real_name });
            if (error) throw error;
            document.getElementById('new-gamertag').value = '';
            document.getElementById('new-realname').value = '';
            showToast(`${gamertag} added`);
            allPlayers = await fetchPlayers();
            playerStandings = await fetchPlayerStandings();
            renderPlayersList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function deletePlayer(id) {
        if (!confirm('Delete this player?')) return;
        try {
            const { error } = await supabaseClient.from('players').delete().eq('id', id);
            if (error) throw error;
            showToast('Player removed');
            allPlayers = await fetchPlayers();
            playerStandings = await fetchPlayerStandings();
            renderPlayersList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ============================================
    // ROUNDS LIST
    // ============================================
    function getTypeBadge(type) {
        if (type === 'ffa') return '<span class="badge badge-ffa">FFA</span>';
        if (type === 'solo_bracket') return '<span class="badge badge-solo">Solo Bracket</span>';
        if (type === 'team_bracket') return '<span class="badge badge-team">Team Bracket</span>';
        return `<span class="badge">${escapeHtml(type)}</span>`;
    }

    function getStatusBadge(status) {
        if (status === 'active') return '<span class="badge badge-active">Active</span>';
        return '<span class="badge badge-completed">Completed</span>';
    }

    function renderRoundsList() {
        const container = document.getElementById('rounds-list');
        if (allRounds.length === 0) {
            container.innerHTML = '<div class="empty-state">No rounds yet. Create one above.</div>';
            return;
        }
        container.innerHTML = allRounds.map(r => `
            <div class="admin-list-item">
                <div class="admin-list-info">
                    <div class="admin-list-title">${escapeHtml(r.name)}</div>
                    <div class="admin-list-meta" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
                        ${getTypeBadge(r.type)}
                        ${getStatusBadge(r.status)}
                        <span style="color:var(--text-dim);font-size:0.75rem;">${escapeHtml(r.game_name)}</span>
                    </div>
                </div>
                <div style="display:flex;gap:var(--space-sm);">
                    <button class="btn btn-purple btn-sm" onclick="manageRound('${r.id}')">Manage</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRound('${r.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function deleteRound(id) {
        if (!confirm('Delete this round and all its data?')) return;
        try {
            const { error } = await supabaseClient.from('rounds').delete().eq('id', id);
            if (error) throw error;
            showToast('Round deleted');
            if (managedRound && managedRound.id === id) {
                managedRound = null;
                document.getElementById('manage-round-section').innerHTML = '';
            }
            allRounds = await fetchRounds();
            renderRoundsList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ============================================
    // NEW ROUND MODAL
    // ============================================
    function openNewRoundModal() {
        wizardStep = 1;
        wizardData = {};
        generatedTeams = [];
        renderWizardStep();
        document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModalOverlay(e) {
        if (e.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('show');
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('show');
    }

    function renderWizardStep() {
        const modal = document.getElementById('modal-content');
        if (wizardStep === 1) renderStep1(modal);
        else if (wizardStep === 2) renderStep2(modal);
        else if (wizardStep === 3) renderStep3(modal);
    }

    function renderStep1(modal) {
        const type = wizardData.type || 'ffa';
        const scoringMode = wizardData.scoringMode || 'simple_score';
        const useWinMult = wizardData.useWinMultiplier !== undefined ? wizardData.useWinMultiplier : (type === 'team_bracket');

        modal.innerHTML = `
            <div class="modal-title">New Round</div>
            <div class="modal-step-header">Step 1 of 3 — Basic Info</div>

            <div class="form-group">
                <label class="form-label">Round Name</label>
                <input type="text" id="w-round-name" class="form-input" placeholder="e.g. Round 1 — Finals" value="${escapeHtml(wizardData.name || '')}">
            </div>
            <div class="form-group">
                <label class="form-label">Game Name</label>
                <input type="text" id="w-game-name" class="form-input" placeholder="e.g. Halo Infinite" value="${escapeHtml(wizardData.gameName || '')}">
            </div>
            <div class="form-group">
                <label class="form-label">Round Type</label>
                <select id="w-round-type" class="form-select" onchange="updateStep1TypeFields()">
                    <option value="ffa" ${type === 'ffa' ? 'selected' : ''}>FFA (Free-For-All)</option>
                    <option value="solo_bracket" ${type === 'solo_bracket' ? 'selected' : ''}>Solo Bracket</option>
                    <option value="team_bracket" ${type === 'team_bracket' ? 'selected' : ''}>Team Bracket</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Sort Order</label>
                <input type="number" id="w-sort-order" class="form-input" value="${wizardData.sortOrder !== undefined ? wizardData.sortOrder : allRounds.length}" style="width:100px;">
            </div>

            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                <span class="chevron">▼</span> Scoring Configuration
            </div>
            <div class="collapsible-body" id="scoring-config">

                <div class="form-group">
                    <label class="form-label">Scoring Mode</label>
                    <select id="w-scoring-mode" class="form-select" onchange="updateStep1ScoringFields()">
                        <option value="halo" ${scoringMode === 'halo' ? 'selected' : ''}>Halo (Score × KDA / 100)</option>
                        <option value="peak" ${scoringMode === 'peak' ? 'selected' : ''}>Peak (Time-based, bracket only)</option>
                        <option value="simple_score" ${scoringMode === 'simple_score' ? 'selected' : ''}>Simple Score (Placement Ladder)</option>
                    </select>
                </div>

                <!-- Simple Score / FFA: placement ladder -->
                <div id="placement-ladder-section">
                    <div class="form-group">
                        <label class="form-label">Placement Points</label>
                        <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-bottom:var(--space-sm);">Format: "1:10, 2:7, 3:5, 4:3, 5:1" — placement:points</p>
                        <textarea id="w-placement-ladder" class="form-textarea" placeholder="1:10, 2:7, 3:5, 4:3, 5:1">${escapeHtml(wizardData.placementLadderRaw || '')}</textarea>
                    </div>
                </div>

                <!-- Peak: time allowed -->
                <div id="peak-section" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">Time Allowed (minutes)</label>
                        <input type="number" id="w-time-allowed" class="form-input" value="${wizardData.timeAllowedMinutes || 10}" min="1" style="width:120px;">
                    </div>
                    <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-bottom:var(--space-sm);">Players who fail (DNF) are ranked by distance covered using the placement ladder above.</p>
                </div>

                <!-- Win multiplier toggle (bracket only, hidden for FFA) -->
                <div id="win-mult-section">
                    <div class="form-group">
                        <label class="form-label" style="display:flex;align-items:center;gap:var(--space-sm);cursor:pointer;">
                            <input type="checkbox" id="w-use-win-mult" ${useWinMult ? 'checked' : ''} style="accent-color:var(--neon-cyan);width:14px;height:14px;">
                            Use Win Multiplier (Prelim 1.25× / Semis 1.50× / Final 1.75×)
                        </label>
                        <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-top:4px;">On by default for team brackets. Applies to Halo and Peak modes.</p>
                    </div>
                </div>

            </div>

            <div class="modal-nav">
                <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="wizardNext1()">Next &rarr;</button>
            </div>
        `;
        updateStep1TypeFields();
        updateStep1ScoringFields();
    }

    function updateStep1TypeFields() {
        const typeEl = document.getElementById('w-round-type');
        if (!typeEl) return;
        const type = typeEl.value;

        const winMultSection = document.getElementById('win-mult-section');
        const scoringModeEl = document.getElementById('w-scoring-mode');

        // FFA can't use Peak mode
        if (type === 'ffa' && scoringModeEl && scoringModeEl.value === 'peak') {
            scoringModeEl.value = 'simple_score';
        }
        // Hide Peak option for FFA
        if (scoringModeEl) {
            Array.from(scoringModeEl.options).forEach(opt => {
                if (opt.value === 'peak') opt.style.display = type === 'ffa' ? 'none' : '';
            });
        }
        // Win multiplier: visible for brackets only, default on for team
        if (winMultSection) {
            winMultSection.style.display = type === 'ffa' ? 'none' : 'block';
        }
        const winMultCb = document.getElementById('w-use-win-mult');
        if (winMultCb && wizardData.useWinMultiplier === undefined) {
            winMultCb.checked = type === 'team_bracket';
        }

        updateStep1ScoringFields();
    }

    function updateStep1ScoringFields() {
        const scoringEl = document.getElementById('w-scoring-mode');
        if (!scoringEl) return;
        const mode = scoringEl.value;

        const ladderSection = document.getElementById('placement-ladder-section');
        const peakSection = document.getElementById('peak-section');

        if (ladderSection) ladderSection.style.display = (mode === 'simple_score' || mode === 'halo') ? 'none' : 'none';
        // Show placement ladder for simple_score AND FFA; Peak shows it for DNF ranks
        const typeEl = document.getElementById('w-round-type');
        const type = typeEl ? typeEl.value : 'ffa';
        if (ladderSection) ladderSection.style.display = (mode === 'simple_score' || type === 'ffa' || mode === 'peak') ? 'block' : 'none';
        if (peakSection) peakSection.style.display = mode === 'peak' ? 'block' : 'none';
    }

    function toggleCollapsible(header) {
        header.classList.toggle('collapsed');
        const body = header.nextElementSibling;
        body.classList.toggle('hidden');
    }

    function wizardNext1() {
        const name = document.getElementById('w-round-name').value.trim();
        const gameName = document.getElementById('w-game-name').value.trim();
        const type = document.getElementById('w-round-type').value;
        const sortOrder = parseInt(document.getElementById('w-sort-order').value) || 0;
        const scoringMode = document.getElementById('w-scoring-mode').value;
        const useWinMultiplier = document.getElementById('w-use-win-mult') ? document.getElementById('w-use-win-mult').checked : false;

        if (!name) return showToast('Enter a round name', 'error');
        if (!gameName) return showToast('Enter a game name', 'error');

        // Parse placement ladder
        const raw = (document.getElementById('w-placement-ladder') || {}).value || '';
        wizardData.placementLadderRaw = raw.trim();
        const ladder = {};
        if (raw.trim()) {
            raw.split(',').forEach(part => {
                const [k, v] = part.trim().split(':');
                const placement = parseInt(k);
                const pts = parseFloat(v);
                if (!isNaN(placement) && !isNaN(pts)) ladder[String(placement)] = pts;
            });
        }

        wizardData.name = name;
        wizardData.gameName = gameName;
        wizardData.type = type;
        wizardData.sortOrder = sortOrder;
        wizardData.scoringMode = scoringMode;
        wizardData.useWinMultiplier = useWinMultiplier;
        wizardData.placementLadder = ladder;
        wizardData.timeAllowedMinutes = scoringMode === 'peak'
            ? (parseInt((document.getElementById('w-time-allowed') || {}).value) || 10)
            : null;

        wizardStep = 2;
        renderWizardStep();
    }

        const type = wizardData.type;

        if (countLabel) countLabel.textContent = `${selected.length} selected`;
    }

    function selectAllPlayers(check) {
        document.querySelectorAll('.player-checkbox-item input[type="checkbox"]').forEach(cb => {
            cb.checked = check;
            const label = document.getElementById(`pc-label-${cb.value}`);
            if (label) label.classList.toggle('checked', check);
        });
        const countLabel = document.getElementById('player-count-label');
        if (countLabel) countLabel.textContent = check ? `${allPlayers.length} selected` : '0 selected';
    }

    function updateTeamCheckbox(teamId) {
        const cb = document.getElementById(`tc-${teamId}`);
        const label = document.getElementById(`tc-label-${teamId}`);
        if (cb.checked) label.classList.add('checked');
        else label.classList.remove('checked');
    }

    function updateNewTeamPlayerCheckbox(playerId) {
        const cb = document.getElementById(`npc-${playerId}`);
        const label = document.getElementById(`npc-label-${playerId}`);
        if (cb.checked) label.classList.add('checked');
        else label.classList.remove('checked');
        // Reset generated teams
        generatedTeams = [];

        if (previewArea) previewArea.innerHTML = '';

    function previewTeams() {
        const teamSize = parseInt(document.getElementById('new-team-size').value) || 2;
        wizardData.teamSize = teamSize;

        const selectedPlayerIds = [];
        document.querySelectorAll('[id^="npc-"]').forEach(cb => {
            if (cb.type === 'checkbox' && cb.checked) selectedPlayerIds.push(cb.value);
        });
        wizardData.newTeamSelectedPlayerIds = new Set(selectedPlayerIds);

        if (selectedPlayerIds.length < 2) {
            return showToast('Select at least 2 players', 'error');
        }

        // Build players with points for snake draft
        const playersWithPts = selectedPlayerIds.map(id => {
            const ps = playerStandings.find(s => s.id === id);
            const p = allPlayers.find(pl => pl.id === id);
            return { ...p, total_points: ps ? ps.total_points : 0 };
        });

        generatedTeams = generateTeamsFromPlayers(playersWithPts, teamSize);
        renderTeamsPreview();
    }

    function renderTeamsPreview() {
        const previewArea = document.getElementById('teams-preview-area');
        if (!previewArea) return;
        if (generatedTeams.length === 0) {
            previewArea.innerHTML = '';
            return;
        }

        let html = '<div style="font-family:var(--font-display);font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:var(--space-sm);">Team Preview (click player to move)</div>';
        html += '<div class="teams-preview">';
        generatedTeams.forEach((team, teamIdx) => {
            html += `<div class="team-preview-card"><div class="team-preview-label">${escapeHtml(team.label)}</div>`;
            team.players.forEach((p, playerIdx) => {
                html += `
                    <div class="team-preview-player">
                        <span>${escapeHtml(p.gamertag)}</span>
                        <button class="move-player-btn" onclick="openMovePlayerModal(${teamIdx}, ${playerIdx})">Move</button>
                    </div>
                `;
            });
            html += '</div>';

        html += '</div>';

    function openMovePlayerModal(fromTeamIdx, playerIdx) {

            .map((t, i) => i !== fromTeamIdx ? `<option value="${i}">${escapeHtml(t.label)}</option>` : '')

            <div class="modal-title" style="margin-bottom:var(--space-md);">Move ${escapeHtml(player.gamertag)}</div>

            </div>

        const player = generatedTeams[fromTeamIdx].players.splice(playerIdx, 1)[0];

    function wizardNext2() {

    function renderStep3(modal) {

        if (type === 'ffa' || type === 'solo_bracket') {

                <div class="review-item"><span class="review-label">Type</span><span class="review-value">${escapeHtml(wizardData.type)}</span></div>
                <div class="review-item"><span class="review-label">Sort Order</span><span class="review-value">${wizardData.sortOrder}</span></div>

            </div>
        `;

    async function createRound() {
        const btn = document.getElementById('create-round-btn');
        if (btn) btn.disabled = true;

        try {
            const type = wizardData.type;

            // Build round insert
            const roundInsert = {
                name: wizardData.name,
                game_name: wizardData.gameName,
                type: type,
                sort_order: wizardData.sortOrder,
                status: 'active',
                scoring_mode: wizardData.scoringMode || 'simple_score',
                placement_ladder: wizardData.placementLadder || {},
                use_win_multiplier: type !== 'ffa' ? (wizardData.useWinMultiplier || false) : false
            };

            if (wizardData.timeAllowedMinutes) {
                roundInsert.time_allowed_minutes = wizardData.timeAllowedMinutes;
            }

            // Keep legacy FFA points for backward compat
            if (type === 'ffa') {
                roundInsert.ffa_placement_points = wizardData.placementLadder || {};
            } else {
                if (wizardData.teamSize) roundInsert.team_size = wizardData.teamSize;
            }

            // Insert round
            const { data: round, error: roundErr } = await supabaseClient
                .from('rounds')
                .insert(roundInsert)
                .select()
                .single();
            if (roundErr) throw roundErr;

            if (type === 'ffa' || type === 'solo_bracket') {
                // Insert round_players
                const rpInserts = wizardData.selectedPlayerIds.map(pid => ({
                    round_id: round.id,
                    player_id: pid
                }));
                const { error: rpErr } = await supabaseClient.from('round_players').insert(rpInserts);
                if (rpErr) throw rpErr;

                // For solo bracket: generate and insert bracket matches
                if (type === 'solo_bracket') {
                    // Build participants sorted by points
                    const participants = wizardData.selectedPlayerIds.map(pid => {
                        const ps = playerStandings.find(s => s.id === pid);
                        return { id: pid, total_points: ps ? ps.total_points : 0 };
                    }).sort((a, b) => b.total_points - a.total_points);

                    const matchInserts = generateBracketMatches(participants, 'solo_bracket', round.id);
                    const { error: matchErr } = await supabaseClient.from('bracket_matches').insert(matchInserts);
                    if (matchErr) throw matchErr;
                    await cascadeByeAdvancement(round.id, 'player');
                }

            } else {
                // team_bracket
                const mode = wizardData.teamMode || 'new';
                let teamsToUse = []; // array of team DB objects {id, team_label}

                if (mode === 'existing') {
                    teamsToUse = allTeams.filter(t => wizardData.selectedTeamIds.includes(t.id));
                } else {
                    // Create/reuse teams and their players
                    for (const team of generatedTeams) {
                        // Check if team label already exists
                        let existingTeam = allTeams.find(t => t.team_label === team.label);
                        let teamId;

                        if (existingTeam) {
                            teamId = existingTeam.id;
                            // Clear existing team_players and re-assign
                            await supabaseClient.from('team_players').delete().eq('team_id', teamId);
                        } else {
                            const { data: newTeam, error: teamErr } = await supabaseClient
                                .from('teams')
                                .insert({ team_label: team.label })
                                .select()
                                .single();
                            if (teamErr) throw teamErr;
                            teamId = newTeam.id;
                        }

                        // Insert team_players
                        const tpInserts = team.players.map(p => ({ team_id: teamId, player_id: p.id }));
                        if (tpInserts.length > 0) {
                            const { error: tpErr } = await supabaseClient.from('team_players').insert(tpInserts);
                            if (tpErr) throw tpErr;
                        }

                        teamsToUse.push({ id: teamId, team_label: team.label });
                    }
                }

                // Insert round_teams
                const rtInserts = teamsToUse.map(t => ({ round_id: round.id, team_id: t.id }));
                const { error: rtErr } = await supabaseClient.from('round_teams').insert(rtInserts);
                if (rtErr) throw rtErr;

                // Generate bracket matches for teams
                const teamParticipants = teamsToUse.map(t => ({ id: t.id, total_points: 0 }));
                const matchInserts = generateBracketMatches(teamParticipants, 'team_bracket', round.id);
                const { error: matchErr } = await supabaseClient.from('bracket_matches').insert(matchInserts);
                if (matchErr) throw matchErr;
                await cascadeByeAdvancement(round.id, 'team');
            }

            showToast(`Round "${wizardData.name}" created!`);
            closeModal();

            // Refresh data
            allRounds = await fetchRounds();
            allTeams = await fetchTeams();
            renderRoundsList();
        } catch (err) {

    // MANAGE ROUND

    async function manageRound(roundId) {
        const section = document.getElementById('manage-round-section');
        section.innerHTML = '<div class="manage-section"><div class="loading">Loading round data</div></div>';

        // Scroll to it
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            managedRound = allRounds.find(r => r.id === roundId);
            if (!managedRound) throw new Error('Round not found');

            if (managedRound.type === 'ffa') {
                await renderFfaManage(section);
            } else {
                await renderBracketManage(section);
            }
        } catch (err) {
            section.innerHTML = `<div class="manage-section"><div class="empty-state">Error loading round: ${escapeHtml(err.message)}</div></div>`;
            console.error(err);
        }
    }

    async function renderFfaManage(section) {

        const roundPlayers = await fetchRoundPlayers(round.id);
        const existingResults = await fetchFfaResults(round.id);

        const existingMap = {};
        existingResults.forEach(r => { existingMap[r.player_id] = r; });

        const players = roundPlayers.map(rp => rp.player).filter(Boolean);
        const isHalo = round.scoring_mode === 'halo';
        const isCompleted = round.status === 'completed';

        const ladder = round.placement_ladder || round.ffa_placement_points || {};
        const ladderDisplay = Object.entries(ladder)

            .map(([k,v]) => `#${k}: ${v}pts`).join(' &bull; ');

        let rowsHtml = '';
        if (isHalo) {
            // Halo mode: enter stats, auto-rank by CFS
            players.forEach(p => {
                const ex = existingMap[p.id] || {};
                const exKda = ex.kda != null ? parseFloat(ex.kda).toFixed(2) : '';
                rowsHtml += `
                    <div class="ffa-placement-row" style="flex-wrap:wrap;gap:var(--space-sm);align-items:flex-start;">
                        <span class="ffa-placement-name" style="min-width:120px;padding-top:6px;">${escapeHtml(p.gamertag)}</span>
                        <div style="display:flex;flex-direction:column;gap:4px;flex:1;">
                            <input type="number" class="form-input" id="ffa-score-${p.id}" data-player-id="${p.id}" placeholder="Score" value="${ex.score ?? ''}" min="0" title="In-game score">
                            <div class="kda-simple-inputs" style="display:flex;gap:4px;">
                                <input type="number" class="form-input" id="ffa-kda-${p.id}" placeholder="KDA (e.g. 2.50)" value="${exKda}" step="0.01" min="0" style="flex:1;">
                            </div>
                            <div class="kda-full-inputs" style="display:none;gap:4px;">
                                <input type="number" class="form-input" id="ffa-kills-${p.id}" placeholder="K" value="${ex.kills ?? ''}" min="0" style="flex:1;" title="Kills">
                                <input type="number" class="form-input" id="ffa-deaths-${p.id}" placeholder="D" value="${ex.deaths ?? ''}" min="0" style="flex:1;" title="Deaths">
                                <input type="number" class="form-input" id="ffa-assists-${p.id}" placeholder="A" value="${ex.assists ?? ''}" min="0" style="flex:1;" title="Assists">
                            </div>

            players.forEach(p => {
                const ex = existingMap[p.id] || {};
                rowsHtml += `
                    <div class="ffa-placement-row">
                        <span class="ffa-placement-name">${escapeHtml(p.gamertag)}</span>
                        <input type="number" class="form-input ffa-placement-input" id="place-${p.id}" data-player-id="${p.id}" value="${ex.placement || ''}" min="1" placeholder="—" style="width:80px;">
                    </div>

        section.innerHTML = `
            <div class="manage-section">
                <div class="manage-section-title">Managing: ${escapeHtml(round.name)}</div>
                <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md);">
                    ${getTypeBadge(round.type)}
                    ${getStatusBadge(round.status)}
                    <span style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);">${{ halo:'Halo', peak:'Peak', simple_score:'Simple Score' }[round.scoring_mode] || ''}</span>

                ${isHalo ? `<div style="margin-bottom:var(--space-md);">
                    <label style="display:flex;align-items:center;gap:var(--space-sm);font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);cursor:pointer;">

    async function saveFfaPlacements() {
        const round = managedRound;
        const isHalo = round.scoring_mode === 'halo';
        const ladder = round.placement_ladder || round.ffa_placement_points || {};
        let results = [];

        if (isHalo) {
            // Collect stats per player
            const isSimpleKda = document.getElementById('ffa-simple-kda').checked;
            const statRows = [];
            document.querySelectorAll('[id^="ffa-score-"]').forEach(scoreEl => {
                const playerId = scoreEl.dataset.playerId;
                const score = parseFloat(scoreEl.value);
                if (isNaN(score)) return; // skip empty rows
                let kda, kills = null, deaths = null, assists = null, cfs, points;
                if (isSimpleKda) {
                    kda = parseFloat(document.getElementById(`ffa-kda-${playerId}`)?.value) || 0;
                    cfs = score * kda;
                    points = cfs / 100;
                } else {
                    kills = parseInt(document.getElementById(`ffa-kills-${playerId}`)?.value) || 0;
                    deaths = parseInt(document.getElementById(`ffa-deaths-${playerId}`)?.value) || 0;
                    assists = parseInt(document.getElementById(`ffa-assists-${playerId}`)?.value) || 0;
                    ({ kda, cfs, points } = calculateHaloPoints(score, kills, deaths, assists, 1.0));
                }
                statRows.push({ player_id: playerId, score, kills, deaths, assists, kda, cfs, points });
            });

            if (statRows.length === 0) return showToast('Enter stats for at least one player', 'error');

            // Auto-rank by CFS descending
            statRows.sort((a, b) => b.cfs - a.cfs);
            statRows.forEach((r, i) => {
                r.placement = i + 1;
                r.points_awarded = r.points;
            });
            results = statRows;
        } else {
            // Manual placement entry
            const inputs = document.querySelectorAll('.ffa-placement-input');
            const usedPlacements = new Set();
            for (const input of inputs) {
                const playerId = input.dataset.playerId;
                const val = input.value.trim();
                if (!val) continue;
                const placement = parseInt(val);
                if (isNaN(placement) || placement < 1) return showToast('Placements must be positive integers', 'error');
                if (usedPlacements.has(placement)) return showToast(`Duplicate placement #${placement}`, 'error');
                usedPlacements.add(placement);
                const pts = parseFloat(ladder[String(placement)] || 0);
                results.push({ player_id: playerId, placement, points_awarded: pts });
            }
            if (results.length === 0) return showToast('Enter at least one placement', 'error');
        }

        try {
            // Build ffa_results inserts
            const ffaInserts = results.map(r => {
                const row = {
                    round_id: round.id,
                    player_id: r.player_id,
                    placement: r.placement,
                    points_awarded: parseFloat(r.points_awarded.toFixed(4))
                };
                if (isHalo) {
                    row.score = r.score;
                    row.kills = r.kills;
                    row.deaths = r.deaths;
                    row.assists = r.assists;
                    row.kda = parseFloat(r.kda.toFixed(4));
                    row.cfs = parseFloat(r.cfs.toFixed(4));
                }
                return row;
            });

            await supabaseClient.from('ffa_results').delete().eq('round_id', round.id);
            const { error: frErr } = await supabaseClient.from('ffa_results').insert(ffaInserts);
            if (frErr) throw frErr;

            await supabaseClient.from('player_points').delete().eq('round_id', round.id).eq('source', 'ffa_placement');
            const ppInserts = results.map(r => ({
                round_id: round.id,
                player_id: r.player_id,
                points: parseFloat(r.points_awarded.toFixed(4)),
                source: 'ffa_placement'
            }));
            const { error: ppErr } = await supabaseClient.from('player_points').insert(ppInserts);
            if (ppErr) throw ppErr;

            const { error: rErr } = await supabaseClient.from('rounds').update({ status: 'completed' }).eq('id', round.id);
            if (rErr) throw rErr;

            showToast('Results saved & round completed!');
            allRounds = await fetchRounds();
            managedRound = allRounds.find(r => r.id === round.id);
            renderRoundsList();
            await renderFfaManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }

    async function renderBracketManage(section) {
        const round = managedRound;

        // Fetch all needed data
        [managedMatches, managedRoundPlayers, managedRoundTeams] = await Promise.all([
            fetchBracketMatches(round.id),
            round.type === 'solo_bracket' ? fetchRoundPlayers(round.id) : Promise.resolve([]),
            round.type === 'team_bracket' ? fetchRoundTeams(round.id) : Promise.resolve([])
        ]);

        const players = managedRoundPlayers.map(rp => rp.player).filter(Boolean);
        const teams = managedRoundTeams.map(rt => rt.team).filter(Boolean);

        // Check if all matches are complete (to show "Complete Round" button)
        const maxRound = managedMatches.reduce((max, m) => Math.max(max, m.bracket_round), 0);
        const finalMatches = managedMatches.filter(m => m.bracket_round === maxRound);
        const allFinalComplete = finalMatches.length > 0 && finalMatches.every(m => m.status === 'completed' || m.status === 'bye');
        const isRoundCompleted = round.status === 'completed';

        section.innerHTML = `
            <div class="manage-section">
                <div class="manage-section-title">Managing: ${escapeHtml(round.name)}</div>
                <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-lg);">
                    ${getTypeBadge(round.type)}
                    ${getStatusBadge(round.status)}
                </div>
                <p style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);margin-bottom:var(--space-md);">
                    ${!isRoundCompleted ? 'Click a highlighted match to record results.' : 'Round completed.'}
                    &bull; Mode: ${{ halo:'Halo', peak:'Peak', simple_score:'Simple Score' }[round.scoring_mode] || 'Simple Score'}
                    ${round.use_win_multiplier ? '&bull; Win multiplier active' : ''}

                ${allFinalComplete && !isRoundCompleted ? `<button class="btn btn-success" style="margin-top:var(--space-md);" onclick="completeRound()">Complete Round &amp; Award Placement Bonuses</button>` : ''}

        renderBracket(
            bracketContainer,
            managedMatches,
            players,
            teams,
            !isRoundCompleted,
            (match) => openMatchResultModal(match, players, teams)
        );
    }

    async function recordMatchResult(matchId, p1Id, p2Id, p1PlayerIds, p2PlayerIds, maxBracketRound) {
        const match = managedMatches.find(m => m.id === matchId);
        if (!match) return showToast('Match not found', 'error');
        const round = managedRound;
        const mode = round.scoring_mode || 'simple_score';
        const useWinMult = round.use_win_multiplier;
        const mult = useWinMult ? getWinMultiplier(match.bracket_round, maxBracketRound) : 1.0;

        let winnerId = null;
        let score1 = null, score2 = null;
        let statsToInsert = []; // match_player_stats rows

        try {
            if (mode === 'halo') {
                const isSimpleKda = document.getElementById('match-simple-kda').checked;
                // Collect stats for each player on each side, sum CFS per side to determine winner
                function collectHaloStats(playerIds, prefix) {
                    return playerIds.map(pid => {
                        const sfx = pid;
                        const scoreEl = document.getElementById(`${prefix}-score-${sfx}`);
                        const s = parseFloat(scoreEl?.value) || 0;
                        let kda, kills = null, deaths = null, assists = null, cfs, points;
                        if (isSimpleKda) {
                            kda = parseFloat(document.getElementById(`${prefix}-kda-${sfx}`)?.value) || 0;
                            cfs = s * kda * mult;
                            points = cfs / 100;
                        } else {
                            kills = parseInt(document.getElementById(`${prefix}-kills-${sfx}`)?.value) || 0;
                            deaths = parseInt(document.getElementById(`${prefix}-deaths-${sfx}`)?.value) || 0;
                            assists = parseInt(document.getElementById(`${prefix}-assists-${sfx}`)?.value) || 0;
                            ({ kda, cfs, points } = calculateHaloPoints(s, kills, deaths, assists, mult));
                        }
                        return { player_id: pid, match_id: matchId, score: s, kills, deaths, assists, kda, cfs, points_awarded: points };
                    });
                }

                // For solo: player IS the participant
                const p1Stats = p1PlayerIds.length > 0 ? collectHaloStats(p1PlayerIds, 'p1') : [];
                const p2Stats = p2PlayerIds.length > 0 ? collectHaloStats(p2PlayerIds, 'p2') : [];

                const p1Cfs = p1Stats.reduce((s, r) => s + r.cfs, 0);
                const p2Cfs = p2Stats.reduce((s, r) => s + r.cfs, 0);
                if (p1Stats.length === 0 && p2Stats.length === 0) return showToast('Enter stats for at least one side', 'error');

                winnerId = p1Cfs >= p2Cfs ? p1Id : p2Id;
                score1 = p1Cfs.toFixed(2);
                score2 = p2Cfs.toFixed(2);
                statsToInsert = [...p1Stats, ...p2Stats];

            } else if (mode === 'peak') {
                const p1Complete = document.getElementById('p1-completed').checked;
                const p2Complete = document.getElementById('p2-completed').checked;
                const timeAllowedSec = (round.time_allowed_minutes || 10) * 60;

                let p1Points = 0, p2Points = 0;
                let p1TimeSec = null, p2TimeSec = null;
                let p1Dist = null, p2Dist = null;

                if (p1Complete) {
                    p1TimeSec = parseInt(document.getElementById('p1-time').value) || 0;
                    const { points } = calculatePeakCompletion(timeAllowedSec, p1TimeSec, mult);
                    p1Points = points;
                } else {
                    p1Dist = parseFloat(document.getElementById('p1-dist').value) || 0;
                }
                if (p2Complete) {
                    p2TimeSec = parseInt(document.getElementById('p2-time').value) || 0;
                    const { points } = calculatePeakCompletion(timeAllowedSec, p2TimeSec, mult);
                    p2Points = points;
                } else {
                    p2Dist = parseFloat(document.getElementById('p2-dist').value) || 0;
                }

                // Determine winner: completion beats DNF; faster time wins; further distance wins
                if (p1Complete && !p2Complete) winnerId = p1Id;
                else if (p2Complete && !p1Complete) winnerId = p2Id;
                else if (p1Complete && p2Complete) winnerId = p1TimeSec <= p2TimeSec ? p1Id : p2Id;
                else winnerId = (p1Dist || 0) >= (p2Dist || 0) ? p1Id : p2Id;

                score1 = p1Complete ? `${p1TimeSec}s` : `${p1Dist}m`;
                score2 = p2Complete ? `${p2TimeSec}s` : `${p2Dist}m`;

                // Award per-player stats (use team player IDs if available)
                const allP1 = p1PlayerIds.length > 0 ? p1PlayerIds : [p1Id];
                const allP2 = p2PlayerIds.length > 0 ? p2PlayerIds : [p2Id];
                // For Peak, only award computed points; stat columns: time or distance
                // We'll store stats separately after match update

            } else {
                // Simple Score: manual winner radio
                const winnerRadio = document.querySelector('input[name="match-winner"]:checked');
                if (!winnerRadio) return showToast('Select a winner', 'error');
                winnerId = winnerRadio.value;
                score1 = (document.getElementById('score-1') || {}).value?.trim() || null;
                score2 = (document.getElementById('score-2') || {}).value?.trim() || null;
                // Simple Score points awarded at completeRound(), not per match
            }

            // 1. Update bracket_match
            const { error: updateErr } = await supabaseClient
                .from('bracket_matches')
                .update({ winner_id: winnerId, score_1: score1, score_2: score2, status: 'completed' })
                .eq('id', matchId);
            if (updateErr) throw updateErr;

            // 2. Insert match_player_stats for Halo
            if (mode === 'halo' && statsToInsert.length > 0) {
                await supabaseClient.from('match_player_stats').delete().eq('match_id', matchId);
                const { error: statsErr } = await supabaseClient.from('match_player_stats').insert(statsToInsert);
                if (statsErr) console.warn('Stats insert error:', statsErr);

                // Award points to players
                await supabaseClient.from('player_points').delete().eq('round_id', round.id).eq('source', 'match_halo').in('player_id', statsToInsert.map(s => s.player_id));
                const ppInserts = statsToInsert.map(s => ({
                    round_id: round.id,
                    player_id: s.player_id,
                    points: parseFloat(s.points_awarded.toFixed(4)),
                    source: 'match_halo'
                }));
                const { error: ppErr } = await supabaseClient.from('player_points').insert(ppInserts);
                if (ppErr) throw ppErr;
            }

            // 3. For Peak: award points to winner's players
            if (mode === 'peak') {
                const winnerPIds = winnerId === p1Id
                    ? (p1PlayerIds.length > 0 ? p1PlayerIds : [p1Id])
                    : (p2PlayerIds.length > 0 ? p2PlayerIds : [p2Id]);
                const winnerTime = winnerId === p1Id
                    ? (document.getElementById('p1-completed').checked ? parseInt(document.getElementById('p1-time').value) || 0 : null)
                    : (document.getElementById('p2-completed').checked ? parseInt(document.getElementById('p2-time').value) || 0 : null);
                const timeAllowedSec = (round.time_allowed_minutes || 10) * 60;
                let peakPts = 0;
                if (winnerTime !== null) {
                    const { points } = calculatePeakCompletion(timeAllowedSec, winnerTime, mult);
                    peakPts = points;
                }
                if (peakPts > 0) {
                    await supabaseClient.from('player_points').delete().eq('round_id', round.id).eq('source', 'match_peak').in('player_id', winnerPIds);
                    const ppInserts = winnerPIds.map(pid => ({
                        round_id: round.id, player_id: pid, points: parseFloat(peakPts.toFixed(4)), source: 'match_peak'
                    }));
                    const { error: ppErr } = await supabaseClient.from('player_points').insert(ppInserts);
                    if (ppErr) throw ppErr;
                }
            }

            // 4. Advance winner
            await advanceWinner(match, winnerId, round.type);

            closeMatchModal();
            showToast('Result recorded!');
            await renderBracketManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }

    async function awardMatchWinPoints(winnerId, participantType, round) {
        // Simple Score: no per-match points, awarded at round completion
        // Halo/Peak: handled in recordMatchResult directly
        // This function is kept for bye auto-advancement (which awards no points)
        // Nothing to do here anymore — points are mode-specific
    }

    // After bracket creation, push all bye-winners forward into subsequent round slots.
    // Also auto-completes any "double-null bye" slots (bracketSize > participant count).
    async function cascadeByeAdvancement(roundId, participantType) {
        const { data: matches, error } = await supabaseClient
            .from('bracket_matches')
            .select('*')
            .eq('round_id', roundId)
            .order('bracket_round', { ascending: true })
            .order('bracket_position', { ascending: true });
        if (error) throw error;

        const byRound = {};
        let maxRound = 0;
        matches.forEach(m => {
            if (!byRound[m.bracket_round]) byRound[m.bracket_round] = [];
            byRound[m.bracket_round].push(m);
            if (m.bracket_round > maxRound) maxRound = m.bracket_round;
        });

        for (let r = 1; r < maxRound; r++) {
            const current = byRound[r] || [];
            const next = byRound[r + 1] || [];

            // Advance every bye winner into the appropriate slot of the next round
            for (const match of current) {
                if (match.status !== 'bye' || !match.winner_id) continue;

                const nextPos = Math.floor(match.bracket_position / 2);
                const slot = match.bracket_position % 2 === 0 ? 1 : 2;
                const nextMatch = next.find(m => m.bracket_position === nextPos);
                if (!nextMatch) continue;

                // Skip if already filled (two byes feeding same next-match)
                const alreadyFilled = slot === 1 ? nextMatch.participant_1_id : nextMatch.participant_2_id;
                if (alreadyFilled) continue;

                const updateData = slot === 1
                    ? { participant_1_type: participantType, participant_1_id: match.winner_id }
                    : { participant_2_type: participantType, participant_2_id: match.winner_id };

                const { error: upErr } = await supabaseClient
                    .from('bracket_matches')
                    .update(updateData)
                    .eq('id', nextMatch.id);
                if (upErr) throw upErr;
                Object.assign(nextMatch, updateData);
            }

            // Auto-complete any next-round match where one slot is filled and the
            // other feeder is a double-null bye (can never produce a winner)
            for (const nextMatch of next) {
                const hasP1 = !!nextMatch.participant_1_id;
                const hasP2 = !!nextMatch.participant_2_id;
                if (hasP1 && hasP2) continue; // real match
                if (!hasP1 && !hasP2) continue; // still fully empty

                const emptySlot = hasP1 ? 2 : 1;
                const emptyFeederPos = emptySlot === 1
                    ? nextMatch.bracket_position * 2
                    : nextMatch.bracket_position * 2 + 1;
                const emptyFeeder = current.find(m => m.bracket_position === emptyFeederPos);

                if (emptyFeeder && emptyFeeder.status === 'bye' && !emptyFeeder.winner_id) {
                    const autoWinnerId = nextMatch.participant_1_id || nextMatch.participant_2_id;
                    const { error: byeErr } = await supabaseClient
                        .from('bracket_matches')
                        .update({ status: 'bye', winner_id: autoWinnerId })
                        .eq('id', nextMatch.id);
                    if (byeErr) throw byeErr;
                    Object.assign(nextMatch, { status: 'bye', winner_id: autoWinnerId });
                }
            }
        }
    }

    async function advanceWinner(match, winnerId, roundType) {
        const nextRound = match.bracket_round + 1;
        const nextPos = Math.floor(match.bracket_position / 2);
        // slot: if position is even, p1; if odd, p2
        const slot = match.bracket_position % 2 === 0 ? 1 : 2;

        // Find the next match
        const nextMatch = managedMatches.find(m =>
            m.bracket_round === nextRound && m.bracket_position === nextPos
        );
        if (!nextMatch) return; // Final round, no advancement needed

        const pType = roundType === 'team_bracket' ? 'team' : 'player';
        const updateData = {};
        if (slot === 1) {
            updateData.participant_1_type = pType;
            updateData.participant_1_id = winnerId;
        } else {
            updateData.participant_2_type = pType;
            updateData.participant_2_id = winnerId;
        }

        const { error: advErr } = await supabaseClient
            .from('bracket_matches')
            .update(updateData)
            .eq('id', nextMatch.id);
        if (advErr) throw advErr;

        // Check if next match is now a bye (other participant is null)
        // Reload the match to check
        const { data: refreshedNext } = await supabaseClient
            .from('bracket_matches')
            .select('*')
            .eq('id', nextMatch.id)
            .single();

        if (refreshedNext) {
            const hasP1 = !!refreshedNext.participant_1_id;
            const hasP2 = !!refreshedNext.participant_2_id;
            // If only one participant after both slots could have been filled, don't auto-bye here
            // But if we're in a later round where the other slot can never be filled... we skip for now
            // Auto-bye: if this match was already pending and now both are filled, just let admin click
            // We only auto-complete if exactly one participant is known AND the bracket is such that
            // the other can never be filled (checked by seeing if the feeder match was also a bye)
            // For simplicity: check if other slot feeder match is a bye/completed with no opponent
            const otherSlot = slot === 1 ? 2 : 1;
            const otherFeederPos = otherSlot === 1 ? nextPos * 2 : nextPos * 2 + 1;
            const feederMatch = managedMatches.find(m =>
                m.bracket_round === match.bracket_round && m.bracket_position === otherFeederPos
            );
            if (feederMatch && feederMatch.status === 'bye' && !feederMatch.winner_id) {
                // Other feeder is a null-null bye, auto-complete next match
                const { error: byeErr } = await supabaseClient
                    .from('bracket_matches')
                    .update({ status: 'bye', winner_id: winnerId })
                    .eq('id', nextMatch.id);
                if (byeErr) throw byeErr;

                // Award match win for the auto-bye too
                await awardMatchWinPoints(winnerId, pType, managedRound);

                // Advance again
                await advanceWinner({ ...nextMatch, bracket_round: nextRound, bracket_position: nextPos }, winnerId, managedRound.type);
            }
        }
    }

    async function completeRound() {
        const round = managedRound;
        const mode = round.scoring_mode || 'simple_score';
        if (!confirm(`Complete round "${round.name}"?`)) return;

        try {
            const maxRound = managedMatches.reduce((max, m) => Math.max(max, m.bracket_round), 0);
            const finalMatch = managedMatches.find(m => m.bracket_round === maxRound);
            if (!finalMatch || !finalMatch.winner_id) return showToast('Final match not completed yet', 'error');

            const pType = round.type === 'team_bracket' ? 'team' : 'player';
            const ladder = round.placement_ladder || {};

            // Build placement map: participant_id -> placement number
            // 1st = final winner, 2nd = final loser
            // 3rd = semi losers (if maxRound >= 2)
            // Remaining placements from earlier rounds (quarterfinals losers = 5th, etc.)
            const placements = {}; // participantId -> placement

            const finalWinnerId = finalMatch.winner_id;
            const finalLoserId = finalWinnerId === finalMatch.participant_1_id
                ? finalMatch.participant_2_id : finalMatch.participant_1_id;

            placements[finalWinnerId] = 1;
            if (finalLoserId) placements[finalLoserId] = 2;

            // Walk bracket rounds in reverse to assign placements
            let currentPlacement = 3;
            for (let r = maxRound - 1; r >= 1; r--) {
                const roundMatches = managedMatches.filter(m => m.bracket_round === r && m.status === 'completed');
                roundMatches.forEach(m => {
                    const loser = m.winner_id === m.participant_1_id ? m.participant_2_id : m.participant_1_id;
                    if (loser && !placements[loser]) {
                        placements[loser] = currentPlacement;
                    }
                });
                currentPlacement += roundMatches.length;
            }

            async function awardPlacement(participantId, placement) {
                const pts = parseFloat(ladder[String(placement)] || 0);
                if (!participantId || pts <= 0) return;
                if (pType === 'team') {
                    const teamData = managedRoundTeams.find(rt => rt.team && rt.team.id === participantId);
                    if (teamData?.team?.team_players) {
                        const ppInserts = teamData.team.team_players.map(tp => ({
                            round_id: round.id, player_id: tp.player_id, points: pts, source: 'placement_bonus'
                        }));
                        if (ppInserts.length > 0) {
                            const { error } = await supabaseClient.from('player_points').insert(ppInserts);
                            if (error) throw error;
                        }
                    }
                } else {
                    const { error } = await supabaseClient.from('player_points').insert({
                        round_id: round.id, player_id: participantId, points: pts, source: 'placement_bonus'
                    });
                    if (error) throw error;
                }
            }

            // For Simple Score: award placement points to all (no per-match points)
            // For Halo/Peak: per-match points already awarded; still award placement bonus from ladder if configured
            await supabaseClient.from('player_points').delete().eq('round_id', round.id).eq('source', 'placement_bonus');

            for (const [participantId, placement] of Object.entries(placements)) {
                await awardPlacement(participantId, placement);
            }

            const { error: rErr } = await supabaseClient.from('rounds').update({ status: 'completed' }).eq('id', round.id);
            if (rErr) throw rErr;

            showToast('Round completed! Points awarded.');
            allRounds = await fetchRounds();
            managedRound = allRounds.find(r => r.id === round.id);
            renderRoundsList();
            await renderBracketManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }
