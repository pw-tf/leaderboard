<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ARENA // Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .badge {
            font-family: var(--font-display);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid;
            white-space: nowrap;
            display: inline-block;
        }
        .badge-ffa { color: var(--neon-yellow); border-color: var(--neon-yellow); background: rgba(255,225,0,0.06); }
        .badge-solo { color: var(--neon-purple); border-color: var(--neon-purple); background: rgba(176,38,255,0.06); }
        .badge-team { color: var(--neon-magenta); border-color: var(--neon-magenta); background: rgba(255,45,149,0.06); }
        .badge-active { color: var(--neon-green); border-color: var(--neon-green); background: rgba(57,255,20,0.06); animation: pulse-active 2s ease-in-out infinite; }
        .badge-completed { color: var(--text-dim); border-color: var(--border-dim); }
        @keyframes pulse-active { 0%,100%{opacity:1} 50%{opacity:0.6} }

        /* Modal steps */
        .modal-step { display: none; }
        .modal-step.active { display: block; }
        .modal-step-header {
            font-family: var(--font-display);
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: var(--space-xs);
        }
        .modal-nav {
            display: flex;
            justify-content: space-between;
            gap: var(--space-sm);
            margin-top: var(--space-xl);
        }

        /* Collapsible */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: var(--space-sm);
            user-select: none;
        }
        .collapsible-header .chevron {
            display: inline-block;
            transition: transform 0.2s;
        }
        .collapsible-header.collapsed .chevron {
            transform: rotate(-90deg);
        }
        .collapsible-body.hidden { display: none; }

        /* Player selection checkboxes */
        .player-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--space-sm);
            margin: var(--space-sm) 0;
        }
        .player-checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .player-checkbox-item:hover {
            border-color: var(--border-glow);
        }
        .player-checkbox-item input[type="checkbox"] {
            accent-color: var(--neon-cyan);
            width: 14px;
            height: 14px;
        }
        .player-checkbox-item.checked {
            border-color: var(--neon-cyan);
            background: rgba(0,240,255,0.05);
        }
        .player-checkbox-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .player-checkbox-item.checked .player-checkbox-label {
            color: var(--neon-cyan);
        }

        /* Team checkbox grid */
        .team-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--space-sm);
            margin: var(--space-sm) 0;
        }
        .team-checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .team-checkbox-item.checked {
            border-color: var(--neon-magenta);
            background: rgba(255,45,149,0.05);
        }
        .team-checkbox-item input[type="checkbox"] {
            accent-color: var(--neon-magenta);
        }

        /* Team preview */
        .teams-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--space-md);
            margin-top: var(--space-md);
        }
        .team-preview-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            padding: var(--space-md);
        }
        .team-preview-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-magenta);
            margin-bottom: var(--space-sm);
        }
        .team-preview-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .team-preview-player:last-child { border-bottom: none; }
        .move-player-btn {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            cursor: pointer;
            padding: 2px 6px;
            transition: all 0.2s;
        }
        .move-player-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        /* Round management */
        .manage-section {
            background: var(--bg-panel);
            border: 1px solid var(--neon-purple);
            border-radius: var(--radius-md);
            padding: var(--space-lg);
            margin-top: var(--space-lg);
        }
        .manage-section-title {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-purple);
            text-shadow: var(--glow-purple);
            margin-bottom: var(--space-lg);
        }

        /* FFA placement form */
        .ffa-placement-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-dim);
        }
        .ffa-placement-row:last-child { border-bottom: none; }
        .ffa-placement-name {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .ffa-placement-input {
            width: 80px;
        }

        /* Bracket container */
        .bracket-admin-container {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            padding: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        /* Review summary */
        .review-item {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        .review-item:last-child { border-bottom: none; }
        .review-label { color: var(--text-dim); min-width: 120px; }
        .review-value { color: var(--text-primary); }

        /* Inline radio */
        .radio-group {
            display: flex;
            gap: var(--space-lg);
            margin: var(--space-sm) 0;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .radio-item input[type="radio"] {
            accent-color: var(--neon-cyan);
        }

        .section-count {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: var(--space-sm);
        }

        .btn-warning {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
        }
        .btn-warning:hover {
            background: rgba(255,225,0,0.1);
            box-shadow: 0 0 10px rgba(255,225,0,0.3);
        }
        .btn-purple {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }
        .btn-purple:hover {
            background: rgba(176,38,255,0.1);
            box-shadow: var(--glow-purple);
        }

        .form-textarea {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }
        .form-textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="site-header">
            <h1 class="site-title">Nexus Arena</h1>
            <p class="site-subtitle">// Admin Terminal //</p>
            <nav class="nav-bar">
                <a href="index.html" class="nav-link">Standings</a>
                <a href="rounds.html" class="nav-link">Rounds</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>

        <!-- LOGIN -->
        <div id="login-section" class="admin-login">
            <div class="panel">
                <div class="panel-title">Admin Access</div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter') handleLogin()">
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:var(--space-sm);" onclick="handleLogin()">
                    Initialize Connection
                </button>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
                <h2 class="section-header" style="margin-bottom:0; border:none; padding:0;">Admin <span class="accent">Panel</span></h2>
                <button class="btn btn-danger btn-sm" onclick="handleLogout()">Logout</button>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab(this, 'players')">Players</button>
                <button class="admin-tab" onclick="switchTab(this, 'rounds')">Rounds</button>
            </div>

            <!-- TAB: PLAYERS -->
            <div id="tab-players" class="tab-content active">
                <div class="panel">
                    <div class="panel-title">Add Player</div>
                    <div style="display:flex; gap:var(--space-sm); flex-wrap:wrap;">
                        <input type="text" id="new-gamertag" class="form-input" placeholder="Gamertag" style="flex:1; min-width:120px;">
                        <input type="text" id="new-realname" class="form-input" placeholder="Real Name" style="flex:1; min-width:120px;">
                        <button class="btn btn-primary" onclick="addPlayer()">Add</button>
                    </div>
                </div>
                <div id="players-list"></div>
            </div>

            <!-- TAB: ROUNDS -->
            <div id="tab-rounds" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
                    <h3 style="font-family:var(--font-display);font-size:0.8rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;">All Rounds</h3>
                    <button class="btn btn-primary" onclick="openNewRoundModal()">+ New Round</button>
                </div>
                <div id="rounds-list"></div>
                <div id="manage-round-section"></div>
            </div>
        </div>
    </div>

    <!-- NEW ROUND MODAL -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModalOverlay(event)">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- MATCH RESULT MODAL -->
    <div id="match-modal-overlay" class="modal-overlay" onclick="closeMatchModalOverlay(event)">
        <div class="modal" id="match-modal-content"></div>
    </div>

    <!-- MOVE PLAYER MODAL -->
    <div id="move-modal-overlay" class="modal-overlay" onclick="closeMoveModalOverlay(event)">
        <div class="modal" id="move-modal-content" style="max-width:320px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
    // ============================================
    // STATE
    // ============================================
    let allPlayers = [];
    let allRounds = [];
    let allTeams = [];
    let playerStandings = [];

    // New round wizard state
    let wizardStep = 1;
    let wizardData = {};
    let generatedTeams = []; // [{label, players:[]}]

    // Current managed round
    let managedRound = null;
    let managedMatches = [];
    let managedRoundPlayers = [];
    let managedRoundTeams = [];

    // ============================================
    // AUTH
    // ============================================
    async function checkAuth() {
        const admin = await isAdmin();
        document.getElementById('login-section').style.display = admin ? 'none' : 'block';
        document.getElementById('admin-panel').style.display = admin ? 'block' : 'none';
        if (admin) loadAllData();
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) return showToast('Enter credentials', 'error');
        try {
            await signIn(email, password);
            showToast('Access granted');
            checkAuth();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function handleLogout() {
        await signOut();
        showToast('Disconnected');
        checkAuth();
    }

    // ============================================
    // TABS
    // ============================================
    function switchTab(btn, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ============================================
    // DATA LOADING
    // ============================================
    async function loadAllData() {
        try {
            [allPlayers, allRounds, allTeams, playerStandings] = await Promise.all([
                fetchPlayers(),
                fetchRounds(),
                fetchTeams(),
                fetchPlayerStandings()
            ]);
            renderPlayersList();
            renderRoundsList();
        } catch (err) {
            console.error(err);
            showToast('Error loading data', 'error');
        }
    }

    // ============================================
    // PLAYERS CRUD
    // ============================================
    function renderPlayersList() {
        const container = document.getElementById('players-list');
        if (allPlayers.length === 0) {
            container.innerHTML = '<div class="empty-state">No players yet.</div>';
            return;
        }
        container.innerHTML = allPlayers.map(p => `
            <div class="admin-list-item">
                <div class="admin-list-info">
                    <div class="admin-list-title">${escapeHtml(p.gamertag)}</div>
                    <div class="admin-list-meta">${escapeHtml(p.real_name)}</div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="deletePlayer('${p.id}')">Delete</button>
            </div>
        `).join('');
    }

    async function addPlayer() {
        const gamertag = document.getElementById('new-gamertag').value.trim();
        const real_name = document.getElementById('new-realname').value.trim();
        if (!gamertag || !real_name) return showToast('Fill in both fields', 'error');
        try {
            const { error } = await supabaseClient.from('players').insert({ gamertag, real_name });
            if (error) throw error;
            document.getElementById('new-gamertag').value = '';
            document.getElementById('new-realname').value = '';
            showToast(`${gamertag} added`);
            allPlayers = await fetchPlayers();
            playerStandings = await fetchPlayerStandings();
            renderPlayersList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function deletePlayer(id) {
        if (!confirm('Delete this player?')) return;
        try {
            const { error } = await supabaseClient.from('players').delete().eq('id', id);
            if (error) throw error;
            showToast('Player removed');
            allPlayers = await fetchPlayers();
            playerStandings = await fetchPlayerStandings();
            renderPlayersList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ============================================
    // ROUNDS LIST
    // ============================================
    function getTypeBadge(type) {
        if (type === 'ffa') return '<span class="badge badge-ffa">FFA</span>';
        if (type === 'solo_bracket') return '<span class="badge badge-solo">Solo Bracket</span>';
        if (type === 'team_bracket') return '<span class="badge badge-team">Team Bracket</span>';
        return `<span class="badge">${escapeHtml(type)}</span>`;
    }

    function getStatusBadge(status) {
        if (status === 'active') return '<span class="badge badge-active">Active</span>';
        return '<span class="badge badge-completed">Completed</span>';
    }

    function renderRoundsList() {
        const container = document.getElementById('rounds-list');
        if (allRounds.length === 0) {
            container.innerHTML = '<div class="empty-state">No rounds yet. Create one above.</div>';
            return;
        }
        container.innerHTML = allRounds.map(r => `
            <div class="admin-list-item">
                <div class="admin-list-info">
                    <div class="admin-list-title">${escapeHtml(r.name)}</div>
                    <div class="admin-list-meta" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
                        ${getTypeBadge(r.type)}
                        ${getStatusBadge(r.status)}
                        <span style="color:var(--text-dim);font-size:0.75rem;">${escapeHtml(r.game_name)}</span>
                    </div>
                </div>
                <div style="display:flex;gap:var(--space-sm);">
                    <button class="btn btn-purple btn-sm" onclick="manageRound('${r.id}')">Manage</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteRound('${r.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function deleteRound(id) {
        if (!confirm('Delete this round and all its data?')) return;
        try {
            const { error } = await supabaseClient.from('rounds').delete().eq('id', id);
            if (error) throw error;
            showToast('Round deleted');
            if (managedRound && managedRound.id === id) {
                managedRound = null;
                document.getElementById('manage-round-section').innerHTML = '';
            }
            allRounds = await fetchRounds();
            renderRoundsList();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    // ============================================
    // NEW ROUND MODAL
    // ============================================
    function openNewRoundModal() {
        wizardStep = 1;
        wizardData = {};
        generatedTeams = [];
        renderWizardStep();
        document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModalOverlay(e) {
        if (e.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('show');
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('show');
    }

    function renderWizardStep() {
        const modal = document.getElementById('modal-content');
        if (wizardStep === 1) renderStep1(modal);
        else if (wizardStep === 2) renderStep2(modal);
        else if (wizardStep === 3) renderStep3(modal);
    }

    function renderStep1(modal) {
        modal.innerHTML = `
            <div class="modal-title">New Round</div>
            <div class="modal-step-header">Step 1 of 3 — Basic Info</div>

            <div class="form-group">
                <label class="form-label">Round Name</label>
                <input type="text" id="w-round-name" class="form-input" placeholder="e.g. Round 1 — Finals" value="${escapeHtml(wizardData.name || '')}">
            </div>
            <div class="form-group">
                <label class="form-label">Game Name</label>
                <input type="text" id="w-game-name" class="form-input" placeholder="e.g. Mario Kart 8" value="${escapeHtml(wizardData.gameName || '')}">
            </div>
            <div class="form-group">
                <label class="form-label">Round Type</label>
                <select id="w-round-type" class="form-select" onchange="updateStep1TypeFields()">
                    <option value="ffa" ${wizardData.type === 'ffa' ? 'selected' : ''}>FFA (Free-For-All)</option>
                    <option value="solo_bracket" ${wizardData.type === 'solo_bracket' ? 'selected' : ''}>Solo Bracket</option>
                    <option value="team_bracket" ${wizardData.type === 'team_bracket' ? 'selected' : ''}>Team Bracket</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Sort Order</label>
                <input type="number" id="w-sort-order" class="form-input" value="${wizardData.sortOrder !== undefined ? wizardData.sortOrder : allRounds.length}" style="width:100px;">
            </div>

            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                <span class="chevron">▼</span> Point Configuration
            </div>
            <div class="collapsible-body" id="points-config">
                <div id="ffa-points-section">
                    <div class="form-group">
                        <label class="form-label">Placement Points</label>
                        <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-bottom:var(--space-sm);">Format: "1:10, 2:7, 3:5, 4:3, 5:1" — placement:points</p>
                        <textarea id="w-ffa-points" class="form-textarea" placeholder="1:10, 2:7, 3:5, 4:3, 5:1">${escapeHtml(wizardData.ffaPointsRaw || '')}</textarea>
                    </div>
                </div>
                <div id="bracket-points-section" style="display:none;">
                    <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;">
                        <div class="form-group" style="flex:1;min-width:100px;">
                            <label class="form-label">Match Win Pts</label>
                            <input type="number" id="w-match-win" class="form-input" value="${wizardData.matchWin !== undefined ? wizardData.matchWin : 1}" min="0">
                        </div>
                        <div class="form-group" style="flex:1;min-width:100px;">
                            <label class="form-label">1st Place Bonus</label>
                            <input type="number" id="w-place-1" class="form-input" value="${wizardData.place1 !== undefined ? wizardData.place1 : 5}" min="0">
                        </div>
                        <div class="form-group" style="flex:1;min-width:100px;">
                            <label class="form-label">2nd Place Bonus</label>
                            <input type="number" id="w-place-2" class="form-input" value="${wizardData.place2 !== undefined ? wizardData.place2 : 3}" min="0">
                        </div>
                        <div class="form-group" style="flex:1;min-width:100px;">
                            <label class="form-label">3rd Place Bonus</label>
                            <input type="number" id="w-place-3" class="form-input" value="${wizardData.place3 !== undefined ? wizardData.place3 : 1}" min="0">
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-nav">

            return showToast('Select at least 2 players', 'error');

        // Build players with points for snake draft
        const playersWithPts = selectedPlayerIds.map(id => {
            const ps = playerStandings.find(s => s.id === id);
            const p = allPlayers.find(pl => pl.id === id);
            return { ...p, total_points: ps ? ps.total_points : 0 };
        });

        generatedTeams = generateTeamsFromPlayers(playersWithPts, teamSize);
        renderTeamsPreview();

    async function createRound() {
        const btn = document.getElementById('create-round-btn');
        if (btn) btn.disabled = true;

        try {
            const type = wizardData.type;

            // Build round insert
            const roundInsert = {
                name: wizardData.name,
                game_name: wizardData.gameName,
                type: type,
                sort_order: wizardData.sortOrder,
                status: 'active'
            };

            if (type === 'ffa') {
                roundInsert.ffa_placement_points = wizardData.ffaPoints || {};
            } else {
                roundInsert.match_win_points = wizardData.matchWin;
                roundInsert.placement_1st_points = wizardData.place1;
                roundInsert.placement_2nd_points = wizardData.place2;
                roundInsert.placement_3rd_points = wizardData.place3;
                if (wizardData.teamSize) roundInsert.team_size = wizardData.teamSize;
            }

            // Insert round
            const { data: round, error: roundErr } = await supabaseClient
                .from('rounds')
                .insert(roundInsert)
                .select()
                .single();
            if (roundErr) throw roundErr;

            if (type === 'ffa' || type === 'solo_bracket') {
                // Insert round_players
                const rpInserts = wizardData.selectedPlayerIds.map(pid => ({
                    round_id: round.id,
                    player_id: pid
                }));
                const { error: rpErr } = await supabaseClient.from('round_players').insert(rpInserts);
                if (rpErr) throw rpErr;

                // For solo bracket: generate and insert bracket matches
                if (type === 'solo_bracket') {
                    // Build participants sorted by points
                    const participants = wizardData.selectedPlayerIds.map(pid => {
                        const ps = playerStandings.find(s => s.id === pid);
                        return { id: pid, total_points: ps ? ps.total_points : 0 };
                    }).sort((a, b) => b.total_points - a.total_points);

                    const matchInserts = generateBracketMatches(participants, 'solo_bracket', round.id);
                    const { error: matchErr } = await supabaseClient.from('bracket_matches').insert(matchInserts);
                    if (matchErr) throw matchErr;
                    await cascadeByeAdvancement(round.id, 'player');
                }

            } else {
                // team_bracket
                const mode = wizardData.teamMode || 'new';
                let teamsToUse = []; // array of team DB objects {id, team_label}

                if (mode === 'existing') {
                    teamsToUse = allTeams.filter(t => wizardData.selectedTeamIds.includes(t.id));
                } else {
                    // Create/reuse teams and their players
                    for (const team of generatedTeams) {
                        // Check if team label already exists
                        let existingTeam = allTeams.find(t => t.team_label === team.label);
                        let teamId;

                        if (existingTeam) {
                            teamId = existingTeam.id;
                            // Clear existing team_players and re-assign
                            await supabaseClient.from('team_players').delete().eq('team_id', teamId);
                        } else {
                            const { data: newTeam, error: teamErr } = await supabaseClient
                                .from('teams')
                                .insert({ team_label: team.label })
                                .select()
                                .single();
                            if (teamErr) throw teamErr;
                            teamId = newTeam.id;
                        }

                        // Insert team_players
                        const tpInserts = team.players.map(p => ({ team_id: teamId, player_id: p.id }));
                        if (tpInserts.length > 0) {
                            const { error: tpErr } = await supabaseClient.from('team_players').insert(tpInserts);
                            if (tpErr) throw tpErr;
                        }

                        teamsToUse.push({ id: teamId, team_label: team.label });
                    }
                }

                // Insert round_teams
                const rtInserts = teamsToUse.map(t => ({ round_id: round.id, team_id: t.id }));
                const { error: rtErr } = await supabaseClient.from('round_teams').insert(rtInserts);
                if (rtErr) throw rtErr;

                // Generate bracket matches for teams
                const teamParticipants = teamsToUse.map(t => ({ id: t.id, total_points: 0 }));
                const matchInserts = generateBracketMatches(teamParticipants, 'team_bracket', round.id);
                const { error: matchErr } = await supabaseClient.from('bracket_matches').insert(matchInserts);
                if (matchErr) throw matchErr;
                await cascadeByeAdvancement(round.id, 'team');
            }

            showToast(`Round "${wizardData.name}" created!`);
            closeModal();

            // Refresh data
            allRounds = await fetchRounds();
            allTeams = await fetchTeams();
            renderRoundsList();
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
            if (btn) btn.disabled = false;
        }
    }

    // ============================================
    // MANAGE ROUND
    // ============================================
    async function manageRound(roundId) {
        const section = document.getElementById('manage-round-section');
        section.innerHTML = '<div class="manage-section"><div class="loading">Loading round data</div></div>';

        // Scroll to it
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            managedRound = allRounds.find(r => r.id === roundId);
            if (!managedRound) throw new Error('Round not found');

            if (managedRound.type === 'ffa') {
                await renderFfaManage(section);
            } else {
                await renderBracketManage(section);
            }
        } catch (err) {
            section.innerHTML = `<div class="manage-section"><div class="empty-state">Error loading round: ${escapeHtml(err.message)}</div></div>`;
            console.error(err);
        }
    }

    async function renderFfaManage(section) {
        const round = managedRound;
        const roundPlayers = await fetchRoundPlayers(round.id);
        const existingResults = await fetchFfaResults(round.id);

        // Build existing placements map
        const existingMap = {};
        existingResults.forEach(r => { existingMap[r.player_id] = r.placement; });

        const players = roundPlayers.map(rp => rp.player).filter(Boolean);

        let rowsHtml = '';
        players.forEach(p => {
            const existing = existingMap[p.id] || '';
            rowsHtml += `
                <div class="ffa-placement-row">
                    <span class="ffa-placement-name">${escapeHtml(p.gamertag)}</span>
                    <input type="number" class="form-input ffa-placement-input" id="place-${p.id}" data-player-id="${p.id}" value="${existing}" min="1" placeholder="—" style="width:80px;">
                </div>
            `;
        });

        const pointsDisplay = Object.entries(round.ffa_placement_points || {})
            .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
            .map(([k,v]) => `#${k}: ${v}pts`)
            .join(' &bull; ');

        const isCompleted = round.status === 'completed';

        section.innerHTML = `
            <div class="manage-section">
                <div class="manage-section-title">Managing: ${escapeHtml(round.name)}</div>
                <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md);">
                    ${getTypeBadge(round.type)}
                    ${getStatusBadge(round.status)}
                </div>
                ${pointsDisplay ? `<p style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);margin-bottom:var(--space-md);">Point schedule: ${pointsDisplay}</p>` : ''}

                <h3 style="font-family:var(--font-display);font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-secondary);margin-bottom:var(--space-md);">Assign Placements</h3>
                <div id="ffa-placement-form">
                    ${rowsHtml || '<div class="empty-state">No players in this round.</div>'}
                </div>
                ${!isCompleted && players.length > 0 ? `<button class="btn btn-success" style="margin-top:var(--space-lg);" onclick="saveFfaPlacements()">Save Placements &amp; Complete Round</button>` : ''}
                ${isCompleted ? '<div style="margin-top:var(--space-md);color:var(--neon-green);font-family:var(--font-mono);font-size:0.85rem;">Round completed.</div>' : ''}
            </div>
        `;
    }

    async function saveFfaPlacements() {
        const round = managedRound;
        const inputs = document.querySelectorAll('.ffa-placement-input');
        const results = [];
        const usedPlacements = new Set();

        for (const input of inputs) {
            const playerId = input.dataset.playerId;
            const val = input.value.trim();
            if (!val) continue;
            const placement = parseInt(val);
            if (isNaN(placement) || placement < 1) return showToast('Placements must be positive integers', 'error');
            if (usedPlacements.has(placement)) return showToast(`Duplicate placement #${placement}`, 'error');
            usedPlacements.add(placement);

            const pts = (round.ffa_placement_points || {})[String(placement)] || 0;
            results.push({ player_id: playerId, placement, points_awarded: pts });
        }

        if (results.length === 0) return showToast('Enter at least one placement', 'error');

        try {
            // Upsert ffa_results
            const ffaInserts = results.map(r => ({
                round_id: round.id,
                player_id: r.player_id,
                placement: r.placement,
                points_awarded: r.points_awarded
            }));

            // Delete existing first (upsert with conflict)
            await supabaseClient.from('ffa_results').delete().eq('round_id', round.id);
            const { error: frErr } = await supabaseClient.from('ffa_results').insert(ffaInserts);
            if (frErr) throw frErr;

            // Upsert player_points
            await supabaseClient.from('player_points').delete().eq('round_id', round.id).eq('source', 'ffa_placement');
            const ppInserts = results.map(r => ({
                round_id: round.id,
                player_id: r.player_id,
                points: r.points_awarded,
                source: 'ffa_placement'
            }));
            const { error: ppErr } = await supabaseClient.from('player_points').insert(ppInserts);
            if (ppErr) throw ppErr;

            // Mark round completed
            const { error: rErr } = await supabaseClient
                .from('rounds')
                .update({ status: 'completed' })
                .eq('id', round.id);
            if (rErr) throw rErr;

            showToast('Placements saved & round completed!');
            allRounds = await fetchRounds();
            managedRound = allRounds.find(r => r.id === round.id);
            renderRoundsList();
            await renderFfaManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }

    async function renderBracketManage(section) {
        const round = managedRound;

        // Fetch all needed data
        [managedMatches, managedRoundPlayers, managedRoundTeams] = await Promise.all([
            fetchBracketMatches(round.id),
            round.type === 'solo_bracket' ? fetchRoundPlayers(round.id) : Promise.resolve([]),
            round.type === 'team_bracket' ? fetchRoundTeams(round.id) : Promise.resolve([])
        ]);

        const players = managedRoundPlayers.map(rp => rp.player).filter(Boolean);
        const teams = managedRoundTeams.map(rt => rt.team).filter(Boolean);

        // Check if all matches are complete (to show "Complete Round" button)
        const maxRound = managedMatches.reduce((max, m) => Math.max(max, m.bracket_round), 0);
        const finalMatches = managedMatches.filter(m => m.bracket_round === maxRound);
        const allFinalComplete = finalMatches.length > 0 && finalMatches.every(m => m.status === 'completed' || m.status === 'bye');
        const isRoundCompleted = round.status === 'completed';

        section.innerHTML = `
            <div class="manage-section">
                <div class="manage-section-title">Managing: ${escapeHtml(round.name)}</div>
                <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-lg);">
                    ${getTypeBadge(round.type)}
                    ${getStatusBadge(round.status)}
                </div>
                <p style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-dim);margin-bottom:var(--space-md);">
                    ${!isRoundCompleted ? 'Click a highlighted match to record results.' : 'Round completed.'}
                </p>
                <div class="bracket-admin-container" id="admin-bracket-render"></div>
                ${allFinalComplete && !isRoundCompleted ? `<button class="btn btn-success" style="margin-top:var(--space-md);" onclick="completeRound()">Complete Round &amp; Award Placement Bonuses</button>` : ''}
                ${isRoundCompleted ? '<div style="color:var(--neon-green);font-family:var(--font-mono);font-size:0.85rem;margin-top:var(--space-sm);">Round completed.</div>' : ''}
            </div>
        `;

        const bracketContainer = document.getElementById('admin-bracket-render');
        renderBracket(
            bracketContainer,
            managedMatches,
            players,
            teams,
            !isRoundCompleted,
            (match) => openMatchResultModal(match, players, teams)
        );
    }

    function openMatchResultModal(match, players, teams) {
        function getName(type, id) {
            if (!id) return 'TBD';
            if (type === 'player') {
                const p = players.find(pl => pl.id === id);
                return p ? p.gamertag : '?';
            } else {
                const t = teams.find(tm => tm.id === id);
                return t ? t.team_label : '?';
            }
        }

        const p1Name = getName(match.participant_1_type, match.participant_1_id);
        const p2Name = getName(match.participant_2_type, match.participant_2_id);

        const modal = document.getElementById('match-modal-content');
        modal.innerHTML = `
            <div class="modal-title">Record Match Result</div>
            <div style="margin-bottom:var(--space-lg);">
                <div class="form-label">Participants</div>
                <div style="display:flex;align-items:center;gap:var(--space-md);margin-top:var(--space-sm);">
                    <span style="font-family:var(--font-mono);font-size:1rem;color:var(--text-primary);flex:1;text-align:center;">${escapeHtml(p1Name)}</span>
                    <span style="font-family:var(--font-display);font-size:0.7rem;color:var(--neon-yellow);">VS</span>
                    <span style="font-family:var(--font-mono);font-size:1rem;color:var(--text-primary);flex:1;text-align:center;">${escapeHtml(p2Name)}</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Winner</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="match-winner" value="${match.participant_1_id}" id="win-p1">
                        ${escapeHtml(p1Name)}
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="match-winner" value="${match.participant_2_id}" id="win-p2">
                        ${escapeHtml(p2Name)}
                    </label>
                </div>
            </div>

            <div style="display:flex;gap:var(--space-md);">
                <div class="form-group" style="flex:1;">
                    <label class="form-label">${escapeHtml(p1Name)} Score</label>
                    <input type="text" id="score-1" class="form-input" placeholder="Optional">
                </div>
                <div class="form-group" style="flex:1;">
                    <label class="form-label">${escapeHtml(p2Name)} Score</label>
                    <input type="text" id="score-2" class="form-input" placeholder="Optional">
                </div>
            </div>

            <div style="display:flex;gap:var(--space-sm);justify-content:flex-end;margin-top:var(--space-md);">
                <button class="btn btn-sm" onclick="closeMatchModal()">Cancel</button>
                <button class="btn btn-success btn-sm" onclick="recordMatchResult('${match.id}')">Record Result</button>
            </div>
        `;
        document.getElementById('match-modal-overlay').classList.add('show');
    }

    function closeMatchModalOverlay(e) {
        if (e.target === document.getElementById('match-modal-overlay')) closeMatchModal();
    }
    function closeMatchModal() {
        document.getElementById('match-modal-overlay').classList.remove('show');
    }

    async function recordMatchResult(matchId) {
        const winnerRadio = document.querySelector('input[name="match-winner"]:checked');
        if (!winnerRadio) return showToast('Select a winner', 'error');
        const winnerId = winnerRadio.value;
        const score1 = document.getElementById('score-1').value.trim() || null;
        const score2 = document.getElementById('score-2').value.trim() || null;

        try {
            const match = managedMatches.find(m => m.id === matchId);
            if (!match) throw new Error('Match not found');

            const round = managedRound;

            // 1. Update bracket_match
            const { error: updateErr } = await supabaseClient
                .from('bracket_matches')
                .update({ winner_id: winnerId, score_1: score1, score_2: score2, status: 'completed' })
                .eq('id', matchId);
            if (updateErr) throw updateErr;

            // 2. Award match_win_points to winner
            await awardMatchWinPoints(winnerId, match.participant_1_type, round);

            // 3. Advance winner to next match
            await advanceWinner(match, winnerId, round.type);

            closeMatchModal();
            showToast('Result recorded!');

            // Re-render
            await renderBracketManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }

    async function awardMatchWinPoints(winnerId, participantType, round) {
        // If team bracket: award to all players on the team
        if (participantType === 'team' || round.type === 'team_bracket') {
            // Find team players
            const teamData = managedRoundTeams.find(rt => rt.team && rt.team.id === winnerId);
            if (teamData && teamData.team && teamData.team.team_players) {
                const ppInserts = teamData.team.team_players.map(tp => ({
                    round_id: round.id,
                    player_id: tp.player_id,
                    points: round.match_win_points,
                    source: 'match_win'
                }));
                if (ppInserts.length > 0) {
                    const { error } = await supabaseClient.from('player_points').insert(ppInserts);
                    if (error) throw error;
                }
            }
        } else {
            // Solo: award directly to player
            const { error } = await supabaseClient.from('player_points').insert({
                round_id: round.id,
                player_id: winnerId,
                points: round.match_win_points,
                source: 'match_win'
            });
            if (error) throw error;
        }
    }

    // After bracket creation, push all bye-winners forward into subsequent round slots.
    // Also auto-completes any "double-null bye" slots (bracketSize > participant count).
    async function cascadeByeAdvancement(roundId, participantType) {
        const { data: matches, error } = await supabaseClient
            .from('bracket_matches')
            .select('*')
            .eq('round_id', roundId)
            .order('bracket_round', { ascending: true })
            .order('bracket_position', { ascending: true });
        if (error) throw error;

        const byRound = {};
        let maxRound = 0;
        matches.forEach(m => {
            if (!byRound[m.bracket_round]) byRound[m.bracket_round] = [];
            byRound[m.bracket_round].push(m);
            if (m.bracket_round > maxRound) maxRound = m.bracket_round;
        });

        for (let r = 1; r < maxRound; r++) {
            const current = byRound[r] || [];
            const next = byRound[r + 1] || [];

            // Advance every bye winner into the appropriate slot of the next round
            for (const match of current) {
                if (match.status !== 'bye' || !match.winner_id) continue;

                const nextPos = Math.floor(match.bracket_position / 2);
                const slot = match.bracket_position % 2 === 0 ? 1 : 2;
                const nextMatch = next.find(m => m.bracket_position === nextPos);
                if (!nextMatch) continue;

                // Skip if already filled (two byes feeding same next-match)
                const alreadyFilled = slot === 1 ? nextMatch.participant_1_id : nextMatch.participant_2_id;
                if (alreadyFilled) continue;

                const updateData = slot === 1
                    ? { participant_1_type: participantType, participant_1_id: match.winner_id }
                    : { participant_2_type: participantType, participant_2_id: match.winner_id };

                const { error: upErr } = await supabaseClient
                    .from('bracket_matches')
                    .update(updateData)
                    .eq('id', nextMatch.id);
                if (upErr) throw upErr;
                Object.assign(nextMatch, updateData);
            }

            // Auto-complete any next-round match where one slot is filled and the
            // other feeder is a double-null bye (can never produce a winner)
            for (const nextMatch of next) {
                const hasP1 = !!nextMatch.participant_1_id;
                const hasP2 = !!nextMatch.participant_2_id;
                if (hasP1 && hasP2) continue; // real match
                if (!hasP1 && !hasP2) continue; // still fully empty

                const emptySlot = hasP1 ? 2 : 1;
                const emptyFeederPos = emptySlot === 1
                    ? nextMatch.bracket_position * 2
                    : nextMatch.bracket_position * 2 + 1;
                const emptyFeeder = current.find(m => m.bracket_position === emptyFeederPos);

                if (emptyFeeder && emptyFeeder.status === 'bye' && !emptyFeeder.winner_id) {
                    const autoWinnerId = nextMatch.participant_1_id || nextMatch.participant_2_id;
                    const { error: byeErr } = await supabaseClient
                        .from('bracket_matches')
                        .update({ status: 'bye', winner_id: autoWinnerId })
                        .eq('id', nextMatch.id);
                    if (byeErr) throw byeErr;
                    Object.assign(nextMatch, { status: 'bye', winner_id: autoWinnerId });
                }
            }
        }
    }

    async function advanceWinner(match, winnerId, roundType) {
        const nextRound = match.bracket_round + 1;
        const nextPos = Math.floor(match.bracket_position / 2);
        // slot: if position is even, p1; if odd, p2
        const slot = match.bracket_position % 2 === 0 ? 1 : 2;

        // Find the next match
        const nextMatch = managedMatches.find(m =>
            m.bracket_round === nextRound && m.bracket_position === nextPos
        );
        if (!nextMatch) return; // Final round, no advancement needed

        const pType = roundType === 'team_bracket' ? 'team' : 'player';
        const updateData = {};
        if (slot === 1) {
            updateData.participant_1_type = pType;
            updateData.participant_1_id = winnerId;
        } else {
            updateData.participant_2_type = pType;
            updateData.participant_2_id = winnerId;
        }

        const { error: advErr } = await supabaseClient
            .from('bracket_matches')
            .update(updateData)
            .eq('id', nextMatch.id);
        if (advErr) throw advErr;

        // Check if next match is now a bye (other participant is null)
        // Reload the match to check
        const { data: refreshedNext } = await supabaseClient
            .from('bracket_matches')
            .select('*')
            .eq('id', nextMatch.id)
            .single();

        if (refreshedNext) {
            const hasP1 = !!refreshedNext.participant_1_id;
            const hasP2 = !!refreshedNext.participant_2_id;
            // If only one participant after both slots could have been filled, don't auto-bye here
            // But if we're in a later round where the other slot can never be filled... we skip for now
            // Auto-bye: if this match was already pending and now both are filled, just let admin click
            // We only auto-complete if exactly one participant is known AND the bracket is such that
            // the other can never be filled (checked by seeing if the feeder match was also a bye)
            // For simplicity: check if other slot feeder match is a bye/completed with no opponent
            const otherSlot = slot === 1 ? 2 : 1;
            const otherFeederPos = otherSlot === 1 ? nextPos * 2 : nextPos * 2 + 1;
            const feederMatch = managedMatches.find(m =>
                m.bracket_round === match.bracket_round && m.bracket_position === otherFeederPos
            );
            if (feederMatch && feederMatch.status === 'bye' && !feederMatch.winner_id) {
                // Other feeder is a null-null bye, auto-complete next match
                const { error: byeErr } = await supabaseClient
                    .from('bracket_matches')
                    .update({ status: 'bye', winner_id: winnerId })
                    .eq('id', nextMatch.id);
                if (byeErr) throw byeErr;

                // Award match win for the auto-bye too
                await awardMatchWinPoints(winnerId, pType, managedRound);

                // Advance again
                await advanceWinner({ ...nextMatch, bracket_round: nextRound, bracket_position: nextPos }, winnerId, managedRound.type);
            }
        }
    }

    async function completeRound() {
        const round = managedRound;
        if (!confirm(`Complete round "${round.name}" and award placement bonuses?`)) return;

        try {
            // Determine final bracket round
            const maxRound = managedMatches.reduce((max, m) => Math.max(max, m.bracket_round), 0);
            const finalMatches = managedMatches.filter(m => m.bracket_round === maxRound);
            const finalMatch = finalMatches[0];

            if (!finalMatch || !finalMatch.winner_id) {
                return showToast('Final match not completed yet', 'error');
            }

            const winnerId = finalMatch.winner_id; // 1st place
            const loserId = winnerId === finalMatch.participant_1_id
                ? finalMatch.participant_2_id
                : finalMatch.participant_1_id; // 2nd place

            // 3rd place: losers of semi-finals
            const semiMatches = managedMatches.filter(m => m.bracket_round === maxRound - 1);
            const thirdPlaceIds = [];
            semiMatches.forEach(m => {
                if (m.status === 'completed' && m.winner_id) {
                    const loser = m.winner_id === m.participant_1_id ? m.participant_2_id : m.participant_1_id;
                    if (loser) thirdPlaceIds.push(loser);
                }
            });

            const pType = round.type === 'team_bracket' ? 'team' : 'player';

            async function awardPlacementBonus(participantId, points, label) {
                if (!participantId || points <= 0) return;
                if (pType === 'team') {
                    const teamData = managedRoundTeams.find(rt => rt.team && rt.team.id === participantId);
                    if (teamData && teamData.team && teamData.team.team_players) {
                        const ppInserts = teamData.team.team_players.map(tp => ({
                            round_id: round.id,
                            player_id: tp.player_id,
                            points: points,
                            source: 'placement_bonus'
                        }));
                        if (ppInserts.length > 0) {
                            const { error } = await supabaseClient.from('player_points').insert(ppInserts);
                            if (error) throw error;
                        }
                    }
                } else {
                    const { error } = await supabaseClient.from('player_points').insert({
                        round_id: round.id,
                        player_id: participantId,
                        points: points,
                        source: 'placement_bonus'
                    });
                    if (error) throw error;
                }
            }

            await awardPlacementBonus(winnerId, round.placement_1st_points, '1st');
            await awardPlacementBonus(loserId, round.placement_2nd_points, '2nd');
            for (const tpId of thirdPlaceIds) {
                await awardPlacementBonus(tpId, round.placement_3rd_points, '3rd');
            }

            // Mark round completed
            const { error: rErr } = await supabaseClient
                .from('rounds')
                .update({ status: 'completed' })
                .eq('id', round.id);
            if (rErr) throw rErr;

            showToast('Round completed! Placement bonuses awarded.');
            allRounds = await fetchRounds();
            managedRound = allRounds.find(r => r.id === round.id);
            renderRoundsList();
            await renderBracketManage(document.getElementById('manage-round-section'));
        } catch (err) {
            showToast(err.message, 'error');
            console.error(err);
        }
    }

    // ============================================
    // INIT
    // ============================================
    checkAuth();
    </script>
