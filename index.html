<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CHEESE BOARD // Standings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="site-header">
            <h1 class="site-title">THE CHEESE BOARD</h1>
            <p class="site-subtitle">// Game Competition Leaderboard //</p>
            <nav class="nav-bar">
                <a href="index.html" class="nav-link">Standings</a>
                <a href="rounds.html" class="nav-link">Rounds</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>

        <main>
            <h2 class="section-header">Overall <span class="accent">Standings</span></h2>
            <div class="panel">
                <div id="standings-table" class="loading">Loading standings</div>
            </div>
        </main>
    </div>

    <!-- BREAKDOWN MODAL -->
    <div id="breakdown-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;overflow-y:auto;padding:var(--space-lg);" onclick="if(event.target===this)closeBreakdown()">
        <div style="max-width:520px;margin:0 auto;background:var(--bg-card);border:1px solid var(--border-glow);border-radius:var(--radius-md);padding:var(--space-xl);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg);">
                <div id="breakdown-title" style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--neon-cyan);text-shadow:var(--glow-cyan);text-transform:uppercase;letter-spacing:2px;"></div>
                <button onclick="closeBreakdown()" style="background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer;">✕</button>
            </div>
            <div id="breakdown-content" class="loading">Loading</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function loadStandings() {
            const container = document.getElementById('standings-table');
            try {
                const standings = await fetchPlayerStandings();
                container.classList.remove('loading');
                if (!standings || standings.length === 0) {
                    container.innerHTML = '<div class="empty-state">No scores recorded yet. Check back after the first round!</div>';
                    return;
                }
                let html = `
                    <table class="leaderboard">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th style="text-align:right;">Total Points</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                standings.forEach((p, i) => {
                    html += `
                        <tr>
                            <td>${renderRank(i)}</td>
                            <td><span class="gamertag breakdown-link" onclick="openBreakdown('${escapeHtml(p.id)}','${escapeHtml(p.gamertag)}')" style="cursor:pointer;text-decoration:underline dotted;">${escapeHtml(p.gamertag)}<span class="real-name">${escapeHtml(p.real_name || '')}</span></span></td>
                            <td style="text-align:right;">${renderPoints(p.total_points)}</td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                container.classList.remove('loading');
                container.innerHTML = '<div class="empty-state">Error loading standings. Please refresh.</div>';
                console.error(err);
            }
        }

        async function openBreakdown(playerId, gamertag) {
            const overlay = document.getElementById('breakdown-overlay');
            const content = document.getElementById('breakdown-content');
            const title = document.getElementById('breakdown-title');
            title.textContent = gamertag;
            content.className = 'loading';
            content.textContent = 'Loading';
            overlay.style.display = 'block';

            try {
                const rows = await fetchPlayerPointsDetail(playerId);
                content.classList.remove('loading');
                if (!rows || rows.length === 0) {
                    content.innerHTML = '<div class="empty-state">No points recorded yet.</div>';
                    return;
                }

                // Group by round
                const byRound = {};
                rows.forEach(r => {
                    if (!byRound[r.round_id]) byRound[r.round_id] = { name: r.round_name, game: r.game_name, scoring_mode: r.scoring_mode, rows: [], total: 0 };
                    byRound[r.round_id].rows.push(r);
                    byRound[r.round_id].total += parseFloat(r.points);
                });

                const modeLabel = { halo: 'Halo', peak: 'Peak', simple_score: 'Simple Score' };
                const sourceLabel = { ffa_placement: 'Placement', match_win: 'Match Win', placement_bonus: 'Placement Bonus' };

                let html = '';
                Object.values(byRound).forEach(round => {
                    html += `
                        <div style="margin-bottom:var(--space-lg);">
                            <div style="font-family:var(--font-display);font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--neon-purple);margin-bottom:4px;">${escapeHtml(round.name)}</div>
                            <div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-bottom:var(--space-sm);">${escapeHtml(round.game)} &bull; ${modeLabel[round.scoring_mode] || round.scoring_mode}</div>
                    `;
                    round.rows.forEach(r => {
                        html += `
                            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-dim);font-family:var(--font-mono);font-size:0.8rem;">
                                <span style="color:var(--text-secondary);">${sourceLabel[r.source] || escapeHtml(r.source)}</span>
                                <span style="color:var(--neon-yellow);">+${parseFloat(r.points).toFixed(2)}</span>
                            </div>
                        `;
                    });
                    html += `
                            <div style="display:flex;justify-content:space-between;padding:4px 0;font-family:var(--font-mono);font-size:0.8rem;font-weight:700;">
                                <span style="color:var(--text-dim);">Round Total</span>
                                <span style="color:var(--neon-cyan);">${round.total.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });

                const grandTotal = rows.reduce((s, r) => s + parseFloat(r.points), 0);
                html += `
                    <div style="display:flex;justify-content:space-between;padding:var(--space-sm) 0;border-top:1px solid var(--neon-cyan);font-family:var(--font-display);font-size:0.8rem;font-weight:700;">
                        <span style="color:var(--text-primary);">TOTAL</span>
                        <span style="color:var(--neon-cyan);text-shadow:var(--glow-cyan);">${grandTotal.toFixed(2)}</span>
                    </div>
                `;
                content.innerHTML = html;
            } catch (err) {
                content.classList.remove('loading');
                content.innerHTML = '<div class="empty-state">Error loading breakdown.</div>';
                console.error(err);
            }
        }

        function closeBreakdown() {
            document.getElementById('breakdown-overlay').style.display = 'none';
        }

        loadStandings();
    </script>
</body>
</html>
