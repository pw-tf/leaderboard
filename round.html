<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CHEESE BOARD // Round</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .round-hero {
            margin-bottom: var(--space-xl);
        }
        .round-hero-name {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
        }
        .round-hero-game {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: var(--space-xs);
        }
        .stat-chips {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-top: var(--space-md);
        }
        .stat-chip {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 4px 12px;
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            background: var(--bg-panel);
        }
        .stat-chip span {
            color: var(--text-primary);
            margin-left: 4px;
        }
        .badge {
            font-family: var(--font-display);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid;
            white-space: nowrap;
            display: inline-block;
        }
        .badge-ffa { color: var(--neon-yellow); border-color: var(--neon-yellow); background: rgba(255,225,0,0.06); }
        .badge-solo { color: var(--neon-purple); border-color: var(--neon-purple); background: rgba(176,38,255,0.06); }
        .badge-team { color: var(--neon-magenta); border-color: var(--neon-magenta); background: rgba(255,45,149,0.06); }
        .badge-active { color: var(--neon-green); border-color: var(--neon-green); background: rgba(57,255,20,0.06); animation: pulse-active 2s ease-in-out infinite; }
        .badge-completed { color: var(--text-dim); border-color: var(--border-dim); background: transparent; }
        @keyframes pulse-active { 0%,100%{opacity:1} 50%{opacity:0.6} }

        .bracket-section {
            margin-bottom: var(--space-xl);
        }
        .bracket-container {
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-md);
            padding: var(--space-md);
        }
        .completed-matches {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }
        .bracket-match-summary {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            padding: var(--space-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }
        .bracket-match-summary .match-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .match-participants {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        .match-p {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .match-p.winner {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(57,255,20,0.3);
            font-weight: 700;
        }
        .match-vs {
            font-family: var(--font-display);
            font-size: 0.6rem;
            color: var(--neon-yellow);
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="site-header">
            <h1 class="site-title">THE CHEESE BOARD</h1>
            <p class="site-subtitle">// Game Competition Leaderboard //</p>
            <nav class="nav-bar">
                <a href="index.html" class="nav-link">Standings</a>
                <a href="rounds.html" class="nav-link">Rounds</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </header>

        <main>
            <div id="round-hero" class="round-hero loading">Loading round</div>
            <div id="round-content"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const roundId = params.get('id');

        function getTypeBadge(type) {
            if (type === 'ffa') return '<span class="badge badge-ffa">FFA</span>';
            if (type === 'solo_bracket') return '<span class="badge badge-solo">Solo Bracket</span>';
            if (type === 'team_bracket') return '<span class="badge badge-team">Team Bracket</span>';
            return `<span class="badge">${escapeHtml(type)}</span>`;
        }

        function getStatusBadge(status) {
            if (status === 'active') return '<span class="badge badge-active">Active</span>';
            return '<span class="badge badge-completed">Completed</span>';
        }

        function renderRoundHero(round) {
            const hero = document.getElementById('round-hero');
            hero.classList.remove('loading');

            const modeLabels = { halo: 'Halo', peak: 'Peak', simple_score: 'Simple Score' };
            const modeLabel = modeLabels[round.scoring_mode] || 'Simple Score';

            const ladder = round.placement_ladder || round.ffa_placement_points || {};
            const ladderPts = Object.entries(ladder).sort((a,b) => parseInt(a[0]) - parseInt(b[0])).map(([k,v]) => `#${k}: ${v}pts`).join(' &bull; ');

            let pointInfo = `<div class="stat-chip">Scoring<span>${escapeHtml(modeLabel)}</span></div>`;
            if (round.scoring_mode === 'peak' && round.time_allowed_minutes) {
                pointInfo += `<div class="stat-chip">Time Allowed<span>${round.time_allowed_minutes}min</span></div>`;
            }
            if (ladderPts) {
                pointInfo += `<div class="stat-chip">Placement Pts<span>${ladderPts}</span></div>`;
            }
            if (round.use_win_multiplier) {
                pointInfo += `<div class="stat-chip">Win Mult<span>Active</span></div>`;
            }

            hero.innerHTML = `
                <div class="round-hero-name">${escapeHtml(round.name)}</div>
                <div class="round-hero-game">${escapeHtml(round.game_name)}</div>
                <div class="stat-chips">
                    ${getTypeBadge(round.type)}
                    ${getStatusBadge(round.status)}
                    ${pointInfo}
                </div>
            `;
        }

        async function renderFfaRound(round) {
            const content = document.getElementById('round-content');
            content.innerHTML = '<h2 class="section-header">Placement <span class="accent">Results</span></h2><div id="ffa-results-container" class="panel loading">Loading results</div>';

            const resultsContainer = document.getElementById('ffa-results-container');
            try {
                const results = await fetchFfaResults(round.id);
                resultsContainer.classList.remove('loading');

                if (!results || results.length === 0) {
                    resultsContainer.innerHTML = '<div class="empty-state">Results will appear here once the admin records placements.</div>';
                    return;
                }

                const isHalo = round.scoring_mode === 'halo';
                let html = `<table class="leaderboard"><thead><tr>
                    <th>Rank</th><th>Player</th>`;
                if (isHalo) {
                    html += `<th style="text-align:right;">Score</th><th style="text-align:right;">K/D/A</th><th style="text-align:right;">KDA</th><th style="text-align:right;">CFS</th>`;
                }
                html += `<th style="text-align:right;">Points</th></tr></thead><tbody>`;

                results.forEach((r) => {
                    const p = r.player;
                    html += `<tr>
                        <td>${renderRank(r.placement - 1)}</td>
                        <td>${p ? renderGamertag(p.gamertag, p.real_name) : '<span class="text-dim">Unknown</span>'}</td>`;
                    if (isHalo) {
                        html += `
                        <td style="text-align:right;font-family:var(--font-mono);font-size:0.85rem;">${r.score != null ? r.score : '—'}</td>
                        <td style="text-align:right;font-family:var(--font-mono);font-size:0.85rem;">${r.kills != null ? `${r.kills}/${r.deaths}/${r.assists}` : '—'}</td>
                        <td style="text-align:right;font-family:var(--font-mono);font-size:0.85rem;">${r.kda != null ? parseFloat(r.kda).toFixed(2) : '—'}</td>
                        <td style="text-align:right;font-family:var(--font-mono);font-size:0.85rem;">${r.cfs != null ? parseFloat(r.cfs).toFixed(2) : '—'}</td>`;
                    }
                    html += `<td style="text-align:right;">${renderPoints(r.points_awarded)}</td></tr>`;
                });
                html += '</tbody></table>';
                resultsContainer.innerHTML = html;
            } catch (err) {
                resultsContainer.classList.remove('loading');
                resultsContainer.innerHTML = '<div class="empty-state">Error loading results.</div>';
                console.error(err);
            }
        }

        async function renderBracketRound(round) {
            const content = document.getElementById('round-content');
            const isTeam = round.type === 'team_bracket';

            content.innerHTML = `
                ${isTeam ? '<h2 class="section-header">Team <span class="accent">Rosters</span></h2><div id="rosters-container" class="loading">Loading rosters</div>' : ''}
                <h2 class="section-header">Bracket</h2>
                <div class="bracket-section">
                    <div class="bracket-container" id="bracket-render-area"></div>
                </div>
                <h2 class="section-header">Completed <span class="accent">Matches</span></h2>
                <div id="completed-matches-container" class="loading">Loading matches</div>
            `;

            const bracketArea = document.getElementById('bracket-render-area');
            const completedContainer = document.getElementById('completed-matches-container');

            try {
                const [matches, roundPlayers, roundTeams] = await Promise.all([
                    fetchBracketMatches(round.id),
                    round.type === 'solo_bracket' ? fetchRoundPlayers(round.id) : Promise.resolve([]),
                    round.type === 'team_bracket' ? fetchRoundTeams(round.id) : Promise.resolve([])
                ]);

                const players = roundPlayers.map(rp => rp.player).filter(Boolean);
                const teams = roundTeams.map(rt => rt.team).filter(Boolean);

                // Render team rosters (expanded by default)
                if (isTeam) {
                    const rostersEl = document.getElementById('rosters-container');
                    rostersEl.classList.remove('loading');
                    if (teams.length === 0) {
                        rostersEl.innerHTML = '<div class="empty-state">No teams found.</div>';
                    } else {
                        let rHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-md);">';
                        teams.forEach(team => {
                            const teamPlayers = (team.team_players || []).map(tp => tp.player).filter(Boolean);
                            rHtml += `
                                <div style="background:var(--bg-card);border:1px solid var(--border-dim);border-radius:var(--radius-sm);padding:var(--space-md);">
                                    <div style="font-family:var(--font-display);font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--neon-magenta);margin-bottom:var(--space-sm);">${escapeHtml(team.team_label)}</div>
                                    ${teamPlayers.map(p => `<div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);padding:3px 0;border-bottom:1px solid var(--border-dim);">${escapeHtml(p.gamertag)}</div>`).join('')}
                                </div>
                            `;
                        });
                        rHtml += '</div>';
                        rostersEl.innerHTML = rHtml;
                    }
                }

                renderBracket(bracketArea, matches, players, teams, false, null);

                completedContainer.classList.remove('loading');
                const completed = matches.filter(m => m.status === 'completed' && (m.participant_1_id || m.participant_2_id));

                if (completed.length === 0) {
                    completedContainer.innerHTML = '<div class="empty-state">No completed matches yet.</div>';
                } else {
                    function getNameById(type, id) {
                        if (!id) return 'TBD';
                        if (type === 'player') {
                            const p = players.find(pl => pl.id === id);
                            return p ? p.gamertag : '?';
                        } else {
                            const t = teams.find(tm => tm.id === id);
                            return t ? t.team_label : '?';
                        }
                    }

                    // Fetch stats for all completed matches (Halo mode)
                    let statsMap = {};
                    if (round.scoring_mode === 'halo') {
                        const statsArr = await Promise.all(completed.map(m => fetchMatchPlayerStats(m.id)));
                        completed.forEach((m, i) => { statsMap[m.id] = statsArr[i] || []; });
                    }

                    const maxRound = matches.reduce((mx, m) => Math.max(mx, m.bracket_round), 0);
                    const roundLabels = { [maxRound]: 'Final', [maxRound - 1]: 'Semis', [maxRound - 2]: 'Quarters' };

                    let html = '<div class="completed-matches">';
                    completed.forEach(m => {
                        const p1Name = getNameById(m.participant_1_type, m.participant_1_id);
                        const p2Name = getNameById(m.participant_2_type, m.participant_2_id);
                        const p1Win = m.winner_id === m.participant_1_id;
                        const p2Win = m.winner_id === m.participant_2_id;
                        const rlabel = roundLabels[m.bracket_round] || `Round ${m.bracket_round}`;

                        const matchStats = statsMap[m.id] || [];
                        let statsHtml = '';
                        if (matchStats.length > 0) {
                            statsHtml = `<div style="margin-top:var(--space-sm);font-family:var(--font-mono);font-size:0.72rem;color:var(--text-dim);">`;
                            matchStats.forEach(s => {
                                const pName = s.player ? s.player.gamertag : '?';
                                statsHtml += `<div style="padding:2px 0;">${escapeHtml(pName)}: Score ${s.score ?? '—'} K/D/A ${s.kills ?? '—'}/${s.deaths ?? '—'}/${s.assists ?? '—'} KDA ${s.kda != null ? parseFloat(s.kda).toFixed(2) : '—'} CFS ${s.cfs != null ? parseFloat(s.cfs).toFixed(2) : '—'} (+${s.points_awarded != null ? parseFloat(s.points_awarded).toFixed(2) : '—'}pts)</div>`;
                            });
                            statsHtml += '</div>';
                        }

                        html += `
                            <div class="bracket-match-summary">
                                <div style="flex:1;">
                                    <div class="match-label">${escapeHtml(rlabel)} &bull; Match ${escapeHtml(String(m.bracket_position + 1))}</div>
                                    <div class="match-participants">
                                        <span class="match-p ${p1Win ? 'winner' : ''}">${escapeHtml(p1Name)}${p1Win ? ' ★' : ''}</span>
                                        <span class="match-vs">VS</span>
                                        <span class="match-p ${p2Win ? 'winner' : ''}">${escapeHtml(p2Name)}${p2Win ? ' ★' : ''}</span>
                                    </div>
                                    ${statsHtml}
                                </div>
                                ${(m.score_1 || m.score_2) ? `<div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--neon-yellow);white-space:nowrap;">${escapeHtml(m.score_1 || '-')} &ndash; ${escapeHtml(m.score_2 || '-')}</div>` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                    completedContainer.innerHTML = html;
                }
            } catch (err) {
                bracketArea.innerHTML = '<div class="empty-state">Error loading bracket.</div>';
                completedContainer.classList.remove('loading');
                completedContainer.innerHTML = '<div class="empty-state">Error loading matches.</div>';
                console.error(err);
            }
        }

        async function init() {
            if (!roundId) {
                document.getElementById('round-hero').classList.remove('loading');
                document.getElementById('round-hero').innerHTML = '<div class="empty-state">No round ID specified. <a href="rounds.html">View all rounds</a>.</div>';
                return;
            }

            try {
                const round = await fetchRound(roundId);
                document.title = `THE CHEESE BOARD // ${round.name}`;
                renderRoundHero(round);

                if (round.type === 'ffa') {
                    await renderFfaRound(round);
                } else {
                    await renderBracketRound(round);
                }
            } catch (err) {
                const hero = document.getElementById('round-hero');
                hero.classList.remove('loading');
                hero.innerHTML = '<div class="empty-state">Round not found. <a href="rounds.html">View all rounds</a>.</div>';
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
